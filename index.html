<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凤翎工坊 · 07号调查员</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #06080c; overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #eaeef5; }
  #stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  #game-root canvas { display: block; image-rendering: pixelated; }
  .hide { opacity: 0 !important; pointer-events: none !important; }

  /* ===== 顶层概览面板 ===== */
  /* ===== 地点档案详情面板（参考世界地图 UI） ===== */
  #detail { position: absolute; top: 0; right: 0; bottom: 0; width: 330px; max-width: 86vw; z-index: 12;
    padding: 26px 24px 30px; overflow-y: auto; background: #0a0d13cc;
    backdrop-filter: blur(9px) saturate(1.1); -webkit-backdrop-filter: blur(9px) saturate(1.1);
    border-left: 1px solid #6fd3c433; box-shadow: -16px 0 50px #000a; transition: opacity .3s, transform .3s; }
  #detail.hide { opacity: 0; transform: translateX(16px); pointer-events: none; }
  #detail .dt-close { float: right; background: #ffffff14; color: #fff; border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; }
  #detail .dt-code { font-size: 11px; color: #6fd3c4; font-family: "Courier New", monospace; letter-spacing: 2px; }
  #detail .dt-status { color: #ffb060; }
  #detail .dt-name { font-size: 22px; font-weight: 800; margin: 9px 0 3px; }
  #detail .dt-place { font-size: 12px; color: #6fd3c4; font-family: "Courier New", monospace; margin-bottom: 14px; }
  #detail .dt-hook { font-size: 13px; color: #c3cad4; line-height: 1.8; padding: 12px; background: #ffffff08; border-radius: 10px; border: 1px solid #ffffff10; }
  #detail .dt-sec { font-size: 11px; letter-spacing: 2px; color: #ffffff66; font-family: "Courier New", monospace; margin: 18px 0 10px; }
  #detail .dt-node { display: flex; gap: 10px; margin-bottom: 12px; }
  #detail .dt-dot { width: 8px; height: 8px; border-radius: 50%; background: #6fd3c4; margin-top: 5px; flex: 0 0 auto; box-shadow: 0 0 8px #6fd3c4; }
  #detail .dt-label { font-size: 11px; color: #6fd3c4; margin-bottom: 2px; }
  #detail .dt-text { font-size: 13px; color: #d6dbe3; line-height: 1.65; }
  #detail .dt-people { display: flex; gap: 12px; flex-wrap: wrap; }
  #detail .dp-person { text-align: center; }
  #detail .dp-person img { width: 46px; height: 46px; image-rendering: pixelated; background: #ffffff08; border: 1px solid #ffffff1a; border-radius: 8px; object-fit: contain; }
  #detail .dp-person span { display: block; font-size: 10px; color: #aab3c0; margin-top: 4px; }
  #detail .dt-enter { width: 100%; margin-top: 22px; background: linear-gradient(90deg, #1e8c7d, #6fd3c4); color: #03120f; border: none; font-size: 15px; font-weight: 700; padding: 12px; border-radius: 999px; cursor: pointer; letter-spacing: 1px; }
  #detail .dt-enter:hover { filter: brightness(1.1); }
  #detail .dt-locked { margin-top: 22px; text-align: center; font-size: 13px; color: #8893a0; padding: 12px; border: 1px dashed #ffffff22; border-radius: 10px; }

  /* ===== 区域内：返回条 ===== */
  #backbar { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; transition: opacity .45s;
    background: linear-gradient(#06080ce8, transparent); }
  #backbar button { background: #ffffff16; color: #fff; border: none; border-radius: 999px;
    padding: 8px 15px; font-size: 13px; cursor: pointer; }
  #backbar button:hover { background: #ffffff2e; }
  #backbar .bbTitle { font-size: 15px; font-weight: 700; text-shadow: 0 2px 8px #000; }
  #backbar .bbTitle b { color: #6fd3c4; font-family: "Courier New", monospace; font-weight: 400; font-size: 12px; }

  /* ===== 区域内：操作提示 ===== */
  #roomhud { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
    font-size: 12px; color: #aab3c0; background: #0d1016cc; border: 1px solid #ffffff14;
    padding: 7px 16px; border-radius: 999px; transition: opacity .45s; }
  #roomhud b { color: #ff9d4d; }

  /* 走近交互提示 */
  #interact { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%); z-index: 11;
    font-size: 12px; color: #03120f; background: #6fd3c4; padding: 6px 14px; border-radius: 999px;
    box-shadow: 0 4px 16px #6fd3c455; transition: opacity .2s; }
  #interact b { font-weight: 800; }
  #interact.hide { opacity: 0; pointer-events: none; }

  /* 对话框 */
  #dialog { position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 20;
    width: 560px; max-width: calc(100vw - 36px); padding: 16px 18px 14px;
    background: #0d1016f7; border: 1px solid #ffffff1f; border-radius: 14px; box-shadow: 0 16px 50px #000c;
    transition: opacity .25s, transform .25s; }
  #dialog.hide { opacity: 0; transform: translateX(-50%) translateY(12px); pointer-events: none; }
  #dialog .dlg-branch-banner { font-size: 11px; color: #03120f; background: linear-gradient(90deg, #c4762e, #ffb060); padding: 5px 12px;
    border-radius: 8px; margin-bottom: 10px; font-family: "Courier New",monospace; letter-spacing: 1px; font-weight: 700;
    box-shadow: 0 4px 14px #ffb06044; text-align: center; }
  #dialog .dlg-speaker { font-size: 12px; letter-spacing: 1px; color: #6fd3c4; font-weight: 700;
    font-family: "Courier New", monospace; margin-bottom: 7px; }
  #dialog .dlg-text { font-size: 15px; line-height: 1.85; color: #eef0f3; min-height: 50px; white-space: pre-line; }
  #dialog .dlg-choices { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  #dialog .dlg-choices button { text-align: left; background: #ffffff0d; color: #eaeef5; border: 1px solid #ffffff1c;
    border-radius: 9px; padding: 10px 13px; font-size: 13px; cursor: pointer; font-family: inherit; transition: .14s; }
  #dialog .dlg-choices button:hover { background: #6fd3c41f; border-color: #6fd3c455; transform: translateX(2px); }
  #dialog .dlg-choices button.cont { color: #6fd3c4; }
  #dialog .dlg-text.inner { color: #ffb060; font-style: italic; }

  /* ===== 世界图顶栏：倒计时 + 记录入口 ===== */
  #topbar { position: absolute; top: 0; right: 0; z-index: 11; padding: 16px 20px; display: flex; align-items: center; gap: 12px; transition: opacity .45s; }
  #topbar.hide { opacity: 0; pointer-events: none; }
  #countdown { font-family: "Courier New", monospace; font-size: 12px; color: #ff9d6b; letter-spacing: 1px;
    background: #1a0e0e88; border: 1px solid #ff7a7a44; padding: 6px 12px; border-radius: 8px; }
  #countdown .cd-val { font-size: 16px; font-weight: 800; color: #ff7a7a; transition: color .3s; }
  #countdown .cd-val.tonight { color: #ff4d4d; animation: cdTonight 1.1s ease-in-out infinite; }
  @keyframes cdTonight { 0%,100% { opacity: 1; text-shadow: 0 0 8px #ff4d4d88; } 50% { opacity: .55; text-shadow: 0 0 2px #ff4d4d44; } }
  #countdown .cd-label { color: #ffffff99; }
  #recordsBtn, #lpHomeBtn { background: #0d1016cc; color: #cfd6e0; border: 1px solid #6fd3c433; border-radius: 999px;
    padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
  #recordsBtn:hover, #lpHomeBtn:hover { border-color: #6fd3c4; color: #fff; }
  #lpHomeBtn { border-color: #ffb06044; }
  #recordsBtn span { color: #6fd3c4; font-family: "Courier New", monospace; }
  #editorBtn { background: linear-gradient(90deg, #c4762e, #ffb060); color: #03120f; border: none; border-radius: 999px;
    padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 700; letter-spacing: 1px; }
  #editorBtn:hover { filter: brightness(1.1); }
  #editorBtn .ed-menu { position: absolute; top: 100%; right: 0; margin-top: 6px; background: #0d1016ee;
    border: 1px solid #ffb06044; border-radius: 10px; padding: 6px; min-width: 220px; box-shadow: 0 12px 32px #000a;
    display: none; }
  #editorBtn.open .ed-menu { display: block; }
  #editorBtn .ed-menu div { padding: 8px 12px; font-size: 12px; color: #eaeef5; cursor: pointer; border-radius: 6px;
    font-weight: normal; letter-spacing: 0; text-align: left; }
  #editorBtn .ed-menu div:hover { background: #ffb06022; }
  #editorBtn .ed-menu div small { display: block; color: #8893a0; font-size: 10px; margin-top: 2px; }

  /* ===== 凤翎私人记录面板 ===== */
  #records { position: absolute; top: 0; right: 0; bottom: 0; width: 340px; max-width: 86vw; z-index: 25;
    background: #0a0d13f7; border-left: 1px solid #6fd3c433; padding: 24px 22px; overflow-y: auto;
    transition: opacity .3s, transform .3s; box-shadow: -16px 0 50px #000a; }
  #records.hide { opacity: 0; transform: translateX(20px); pointer-events: none; }
  #records .rec-head { display: flex; justify-content: space-between; align-items: center; }
  #records .rec-head span { font-size: 16px; font-weight: 800; color: #ffb060; }
  #records .rec-head button { background: #ffffff14; color: #fff; border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; }
  #records .rec-sub { font-size: 11px; color: #ffffff66; margin: 6px 0 18px; font-style: italic; }
  #records .rec-empty { font-size: 12px; color: #8893a0; line-height: 1.9; }
  #records .rec-card { background: #ffb0600d; border: 1px solid #ffb06033; border-left: 2px solid #ffb060; border-radius: 8px; padding: 11px 13px; margin-bottom: 10px; }
  #records .rec-card .rc-code { font-size: 10px; color: #6fd3c4; font-family: "Courier New", monospace; letter-spacing: 1px; margin-bottom: 5px; }
  #records .rec-card .rc-clue { font-size: 13px; color: #eaeef5; line-height: 1.7; }
  #records .rec-section { font-size: 11px; color: #6fd3c4; letter-spacing: 2px; font-family: "Courier New", monospace;
    margin: 16px 0 10px; padding-bottom: 4px; border-bottom: 1px solid #6fd3c422; }
  #records .rec-section:first-child { margin-top: 0; }
  #records .rec-section em { color: #8893a0; font-size: 10px; letter-spacing: 0; font-family: -apple-system, "PingFang SC", sans-serif; font-weight: normal; margin-left: 6px; }
  #records .rec-card.branch { background: #c4762e0d; border-color: #c4762e33; border-left-color: #c4762e; }
  #records .rec-card.branch .rc-code { color: #ffb060; }
  /* M6 调查日志:已揭露=青绿可展开卡;待揭露=灰色占位;解锁=2s 渐亮动画 */
  #records .rec-card.clue { background: #6fd3c40d; border-color: #6fd3c433; border-left-color: #6fd3c4; cursor: pointer; }
  #records .rec-card.clue .rc-code { color: #6fd3c4; }
  #records .rec-card.clue .rc-detail { font-size: 12px; color: #aab3c0; line-height: 1.7; margin-top: 7px; padding-top: 7px; border-top: 1px dashed #6fd3c422; display: none; }
  #records .rec-card.clue.open .rc-detail { display: block; }
  #records .rec-card.clue .rc-expand { font-size: 9px; color: #6fd3c488; float: right; }
  #records .rec-card.clue-locked { background: #ffffff05; border-color: #ffffff14; border-left-color: #3a4350; cursor: default; }
  #records .rec-card.clue-locked .rc-clue { color: #5a6577; letter-spacing: 3px; }
  #records .rec-card.clue.just-unlocked { animation: clueUnlock 2s ease-out; }
  @keyframes clueUnlock { 0% { opacity: 0.25; filter: grayscale(1); transform: translateX(6px); } 100% { opacity: 1; filter: none; transform: none; } }
  #records .inv-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  #records .inv-chip { font-size: 11px; color: #ffd06b; background: #ffd06b12; border: 1px solid #ffd06b3a; border-radius: 999px; padding: 4px 11px; }

  /* ===== 线索记入提示 ===== */
  #clueToast { position: absolute; top: 64px; left: 50%; transform: translateX(-50%); z-index: 30; max-width: 440px;
    background: #0d1016f5; border: 1px solid #ffb06055; border-radius: 10px; padding: 12px 18px; text-align: center;
    font-size: 13px; color: #eaeef5; line-height: 1.7; transition: opacity .3s; box-shadow: 0 8px 30px #000a; }
  #clueToast b { color: #ffb060; font-size: 12px; display: block; margin-bottom: 4px; }
  #clueToast.hide { opacity: 0; pointer-events: none; }

  /* ===== 世界地图（高清 DOM 界面，替代 Phaser 画布版） ===== */
  #worldmap { position: absolute; inset: 0; z-index: 6; overflow: hidden; background: #06080c;
    background-image: linear-gradient(#6fd3c40a 1px, transparent 1px), linear-gradient(90deg, #6fd3c40a 1px, transparent 1px);
    background-size: 38px 38px; }
  #worldmap.hide { display: none; }
  .wm-hud { position: absolute; font-family: "Courier New", monospace; color: #6fd3c4; letter-spacing: 2px; }
  .wm-hud.tl { top: 16px; left: 18px; font-size: 12px; opacity: .75; }
  .wm-hud.bl { bottom: 14px; left: 18px; font-size: 10px; opacity: .4; }
  .wm-lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .wm-lines line { stroke: #ff9d4d; stroke-width: .35; stroke-dasharray: 1 1.6; opacity: .5; }
  .wm-nosignal { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-family: "Courier New", monospace; font-size: 11px; color: #5a6577; letter-spacing: 2px; }
  /* 盲区 NO SIGNAL 呼吸闪烁(氛围:像还没锁定的信号) */
  .wm2-fog .wm-nosignal { animation: wmBlindFlicker 2.6s ease-in-out infinite; }
  @keyframes wmBlindFlicker { 0%,100% { opacity: .55; } 44% { opacity: .9; } 50% { opacity: .25; } 56% { opacity: .8; } }
  /* 新解锁地点:从迷雾中"显影"浮现(收集到线索解锁新篇时播一次) */
  @keyframes wmReveal { 0% { opacity: 0; filter: blur(7px) brightness(2.2); transform: scale(.88); } 55% { opacity: 1; filter: blur(0) brightness(1.5); } 100% { opacity: 1; filter: none; transform: scale(1); } }
  @keyframes wmRevealRing { 0% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes wmRevealName { 0%,30% { opacity: 0; } 100% { opacity: 1; } }

  /* ===== 世界地图 v2:澜洲大陆(像素整图 + 战雾 + 地点徽章) ===== */
  #worldmap { display: flex; align-items: center; justify-content: center; }
  .wm2-stage { position: relative; aspect-ratio: 1672 / 941; width: min(97vw, calc(94vh * 1.777)); max-height: 94vh; transition: transform .42s cubic-bezier(.25,.8,.3,1); }
  /* 面板打开时地图整体左移让位(Google Maps panTo 范式:被选内容永不被面板盖死) */
  #worldmap.panel-open .wm2-stage { transform: translateX(min(-160px, -11vw)); }
  /* 选中徽章:琥珀高亮环,和面板形成"你点的是它"的视觉连线 */
  .wm2-loc.selected .wm2-badge { border-color: #ffb060; box-shadow: 0 0 0 3px #ffb06055, 0 0 28px #ffb06088, 0 6px 18px #0009; transform: scale(1.1); }
  .wm2-loc.selected .wm2-locname { color: #ffb060; }
  .wm2-map { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: pixelated; border-radius: 6px; box-shadow: 0 0 0 1px #6fd3c422, 0 24px 80px #000c; }
  .wm2-fog { position: absolute; transform: translate(-50%, -50%); cursor: help; z-index: 3; }
  .wm2-fog .wm-nosignal { position: static; transform: none; font-size: clamp(7px, 0.7vw, 10px); letter-spacing: 2px; color: #3f4a58; background: #06080c66; padding: 2px 8px; border: 1px dashed #3f4a5844; border-radius: 4px; white-space: nowrap; opacity: .8; }
  .wm2-region { position: absolute; transform: translate(-50%, -50%); z-index: 4; cursor: pointer; font-family: "Courier New", monospace; font-size: clamp(10px, 1vw, 14px); letter-spacing: 2px; color: #6fd3c4; background: #06080ccc; border: 1px solid #6fd3c455; padding: 5px 13px; border-radius: 999px; box-shadow: 0 0 18px #6fd3c433; transition: .15s; white-space: nowrap; }
  .wm2-region:hover { border-color: #6fd3c4; box-shadow: 0 0 26px #6fd3c466; }
  .wm2-loc { position: absolute; transform: translate(-50%, -50%); width: 130px; text-align: center; cursor: pointer; z-index: 5; }
  .wm2-badge { width: 56px; height: 56px; margin: 0 auto; border-radius: 11px; border: 2px solid #6fd3c488; background-size: cover; background-position: center; background-color: #0a0e15; image-rendering: pixelated; box-shadow: 0 0 14px #6fd3c433, 0 6px 18px #0009; position: relative; transition: .15s; }
  .wm2-loc:hover .wm2-badge { border-color: #6fd3c4; box-shadow: 0 0 24px #6fd3c466; transform: scale(1.06); }
  .wm2-loc.current .wm2-badge { border-color: #ffb060; box-shadow: 0 0 18px #ffb06044, 0 6px 18px #0009; }
  .wm2-loc.locked .wm2-badge { filter: grayscale(.85) brightness(.5); border-color: #4a525e; }
  .wm2-lock { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 19px; filter: none; }
  .wm2-hero { position: absolute; right: -11px; bottom: -9px; width: 25px; image-rendering: pixelated; filter: drop-shadow(0 0 6px #ffb060); }
  .wm2-locname { margin-top: 6px; font-size: clamp(10px, 0.9vw, 13px); color: #e8f2ef; font-family: "Courier New", monospace; text-shadow: 0 1px 5px #000, 0 0 10px #000, 0 0 3px #000; white-space: nowrap; background: #06080c99; padding: 1px 7px; border-radius: 4px; display: inline-block; }
  .wm2-loc.current .wm2-locname { color: #ffb060; }
  .wm2-loc.locked .wm2-locname { color: #5a6577; }
  .wm2-loc .wm2-here { font-size: 9px; color: #ffb060; font-family: "Courier New", monospace; margin-top: 2px; letter-spacing: 1px; }
  .wm2-loc.just-revealed .wm2-badge { animation: wmReveal 1.2s cubic-bezier(.2,.7,.3,1) both; }
  .wm2-loc.just-revealed .wm2-badge::after { content: ""; position: absolute; inset: -2px; border-radius: 12px; box-shadow: 0 0 0 2px #6fd3c4, 0 0 26px #6fd3c4aa; opacity: 0; animation: wmRevealRing 1.2s ease-out; pointer-events: none; }
  .wm2-loc.just-revealed .wm2-locname { animation: wmRevealName 1.2s ease-out both; }
  /* 富档案面板增量 */
  .dt-thumb { width: 100%; aspect-ratio: 16/8; border-radius: 10px; border: 1px solid #6fd3c433; background-size: cover; background-position: center; image-rendering: pixelated; margin: 12px 0 4px; box-shadow: inset 0 0 30px #0008; }
  .dt-fac { display: block; width: 100%; text-align: left; background: #ffffff0a; color: #eaeef5; border: 1px solid #6fd3c433; border-radius: 9px; padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; margin-bottom: 8px; transition: .14s; }
  .dt-fac small { display: block; font-weight: 400; font-size: 10px; color: #6fd3c4; font-family: "Courier New", monospace; margin-top: 2px; }
  .dt-fac:hover { background: #6fd3c41c; border-color: #6fd3c4; transform: translateX(3px); }
  .dt-fac.locked { background: #ffffff05; color: #5a6577; border-style: dashed; cursor: not-allowed; }
  .dt-fac.locked small { color: #5a6577; }
  .dt-tl { margin: 4px 0 2px; }
  .dt-tl-item { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px dashed #ffffff10; }
  .dt-tl-year { font-family: "Courier New", monospace; font-size: 11px; color: #6fd3c4; flex-shrink: 0; width: 44px; }
  .dt-tl-body b { display: block; font-size: 12px; color: #eaeef5; margin-bottom: 2px; }
  .dt-tl-body span { font-size: 11px; color: #8893a0; line-height: 1.5; }
  .dp-person small { display: block; color: #8893a0; font-size: 9px; margin-top: 1px; }

  #err { position: absolute; inset: 0; z-index: 70; display: none; align-items: center; justify-content: center;
    background: #06080c; color: #ff7a7a; font-size: 13px; text-align: center; padding: 40px; line-height: 2; }

  /* ===== 开场 Hero(粒子封面 · 默认入口先于 Landing;审美画像 v2.1)===== */
  #hero07 { position: absolute; inset: 0; z-index: 35; overflow: hidden; background: #FAF9F6; transition: opacity .7s; }
  #hero07.hide { display: none; }
  #hero07.fading { opacity: 0; pointer-events: none; }
  #h7fx, #h7grain { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #h7grain { pointer-events: none; opacity: 0.07; }
  .h7-blob { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(2px); transition: opacity .9s; }
  .h7-b1 { width: 380px; height: 380px; right: -100px; top: -120px; background: radial-gradient(circle, #CECBF6cc, #CECBF600 70%); }
  .h7-b2 { width: 250px; height: 250px; right: 12%; bottom: -90px; background: radial-gradient(circle, #9FE1CBaa, #9FE1CB00 70%); }
  .h7-b3 { width: 150px; height: 150px; left: -45px; bottom: 16%; background: radial-gradient(circle, #FAC77588, #FAC77500 70%); }
  #hero07.diving .h7-blob, #hero07.diving .h7-ghost07 { opacity: 0; }
  .h7-ghost07 { position: absolute; right: 5vw; bottom: -4vh; font-family: Georgia, serif; transition: opacity .9s;
    font-size: clamp(180px, 26vw, 340px); line-height: 1; color: #534AB7; opacity: 0.07; pointer-events: none; letter-spacing: -10px; }
  .h7-inner { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center;

  /* fixed:环境结构,虚线框,只可选 */

  /* NPC / spawn 浮层(可拖拽) */
  .ed-pawn { position: absolute; cursor: grab; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center;
    transition: filter .12s; user-select: none; pointer-events: auto; z-index: 5; }

  /* 3 步上手引导 tooltip */

    font-size: 13px; font-weight: 600; box-shadow: 0 8px 28px #ffb06066, 0 0 0 4px #ffb06022;
    max-width: 280px; line-height: 1.5; }
  #edTour.hide { display: none; }
  #edTour::before { content: ""; position: absolute; border: 9px solid transparent; }

  #edTour[data-arrow="bottom"]::before { bottom: -18px; left: 24px; border-top-color: #ffb060; }
  #edTour[data-arrow="left"]::before { left: -18px; top: 16px; border-right-color: #ffb060; }

  #edTour button.skip { background: transparent; color: #03120f; opacity: .6; }

  /* 一键保存 toast */

    transition: opacity .25s, transform .25s; }

    padding: 10px 14px; font-size: 13px; font-family: inherit; outline: none; }

    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }

  #edCmd .cmd-log .cl-item.err { border-left: 2px solid #c4444c; color: #d0a0a5; }

  /* F7-A 发布门 */

  /* F7-A 读者模式:藏掉创作者入口 + 顶部只读角标 */
  body.reader-mode #editorBtn, body.reader-mode #lpHomeBtn { display: none !important; }

  <script src="phaser.min.js"></script>
  <script>
  (function () {
    const $ = s => document.querySelector(s);
    const escapeHTML = value => String(value == null ? "" : value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    if (typeof Phaser === "undefined") { showErr("Phaser 引擎未能加载（网络问题）。"); return; }

    let DATA = null, GAME = null;
    // ===== E2E 测试支撑(常开·无害):全局错误收集器,供 headless 冒烟测试探测加载期 JS 错误 =====
    window.__E2E_ERR = [];
    window.addEventListener("error", e => window.__E2E_ERR.push((e.message || "err") + " @" + (e.filename || "").split("/").pop() + ":" + (e.lineno || "")));
    window.addEventListener("unhandledrejection", e => window.__E2E_ERR.push("promise:" + ((e.reason && e.reason.message) || e.reason)));
    // 探针:把当前视图 + 错误列表写进 DOM,headless --dump-dom 可读(?e2e=1 触发)
    function writeE2EOut(tries) {
      tries = tries || 0;
      const vis = id => { const el = document.getElementById(id); return el && !el.classList.contains("hide"); };
      const cs = (typeof window.__curScene === "function") ? (window.__curScene() || "") : "";
      let view = "unknown";
      if (cs.indexOf("editor") === 0 || vis("editor")) view = "editor";
      else if (cs === "eventedit" || vis("evEditor")) view = "eventedit"; // 必须在 event 判定之前("eventedit".indexOf("event")===0 会被吞)
      else if (cs.indexOf("room") === 0 || window.__roomStarted) view = "room"; // __roomStarted 由 BootScene 路由同步置,可靠(不依赖 Phaser 渲染时序)
      else if (cs.indexOf("event") === 0 || vis("eventplay")) view = "event";
      else if (vis("landing")) view = "landing";
      else if (vis("worldmap")) view = "worldmap";
      // 视图未就绪(房间 Phaser scene 还在起)→ 轮询重试,治探针时序 flaky
      if (view === "unknown" && tries < 26) { setTimeout(() => writeE2EOut(tries + 1), 400); return; }
      const ed = (typeof ED !== "undefined" && ED) ? ED : null;
      const out = { view, curScene: cs, roomStarted: window.__roomStarted || null, errors: window.__E2E_ERR.slice(), props: ed ? (ed.props || []).length : null, npcs: ed ? (ed.npcs || []).length : null };
      let d = document.getElementById("e2eOut");
      if (!d) { d = document.createElement("div"); d.id = "e2eOut"; d.style.cssText = "position:fixed;bottom:0;left:0;z-index:99999;background:#000;color:#0f0;font:12px monospace;padding:6px;white-space:pre-wrap"; document.body.appendChild(d); }
      d.textContent = "E2EOUT " + JSON.stringify(out);
      document.title = "E2EOUT view=" + view + " errors=" + out.errors.length;
    }
    const C = {
      floorA: 0x121620, floorB: 0x0f131c, wall: 0x39434f, wallTop: 0x4d5868, // 墙提亮一档,和压暗的地板拉开对比(审查 P2:撞了才知道是墙)
      hero: 0xffb060, heroDark: 0x7a3d12, heroChip: 0x6fd3c4, node: 0x6fd3c4, line: 0xff9d4d,
    };

    // ===== 留存：凤翎私人记录（localStorage 持久化）=====
    const STORE_KEY = "fs01_records";
    function loadRecords() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch (e) { return []; } }
    function saveRecordId(id) { const r = loadRecords(); if (!r.includes(id)) { r.push(id); try { localStorage.setItem(STORE_KEY, JSON.stringify(r)); } catch (e) {} } }
    function hasRecordId(id) { return loadRecords().includes(id); }
    function recordableCount() { return DATA.chapters.filter(c => c.clue).length; }
    function chapterUnlocked(ch) { return !ch.locked || loadRecords().length >= (ch.requires || 0); }
    // 分支痕迹:玩家选项触发的 outcome 写入 localStorage,与"核心线索"并列展示
    const BRANCH_KEY = "fs01_branches";
    function loadBranches() { try { return JSON.parse(localStorage.getItem(BRANCH_KEY)) || []; } catch (e) { return []; } }
    function saveBranch(id) { const r = loadBranches(); if (!r.includes(id)) { r.push(id); try { localStorage.setItem(BRANCH_KEY, JSON.stringify(r)); } catch (e) {} } }
    function getAllOutcomes() { const o = {}; (DATA.chapters || []).forEach(c => Object.assign(o, c.branchOutcomes || {})); return o; }
    // ===== M5 玩法数据层:标志位 / 道具 / 调查日志线索 / 已访问 / 触发器完成 =====
    const FLAG_KEY = "fs01_flags";
    function loadFlags() { try { return JSON.parse(localStorage.getItem(FLAG_KEY)) || {}; } catch (e) { return {}; } }
    function setFlag(k, v) { if (!k) return; const f = loadFlags(); if (v === false) delete f[k]; else f[k] = true; try { localStorage.setItem(FLAG_KEY, JSON.stringify(f)); } catch (e) {} }
    function hasFlag(k) { return !!loadFlags()[k]; }
    const INV_KEY = "fs01_inventory";
    function loadInventory() { try { return JSON.parse(localStorage.getItem(INV_KEY)) || []; } catch (e) { return []; } }
    function hasItem(id) { return loadInventory().includes(id); }
    function doGiveItem(id, name) {
      if (!id || hasItem(id)) return false;
      const inv = loadInventory(); inv.push(id);
      try { localStorage.setItem(INV_KEY, JSON.stringify(inv)); } catch (e) {}
      showClueToast(name || id, "🔑 获得道具"); buildRecords();
      return true;
    }
    const CLUE_KEY = "fs01_clues_revealed";
    function loadCluesRevealed() { try { return JSON.parse(localStorage.getItem(CLUE_KEY)) || []; } catch (e) { return []; } }
    function clueRevealed(id) { return loadCluesRevealed().includes(id); }
    function getAllClues() { const out = []; (DATA.chapters || []).forEach(c => (c.clues || []).forEach(cl => out.push({ ...cl, chId: c.id, chTitle: c.title }))); return out; }
    function revealClue(id) {
      if (!id || clueRevealed(id)) return false;
      const r = loadCluesRevealed(); r.push(id);
      try { localStorage.setItem(CLUE_KEY, JSON.stringify(r)); } catch (e) {}
      const cl = getAllClues().find(c => c.id === id);
      showClueToast(cl ? cl.name : id, "📋 调查日志已更新"); window.__lastClueUnlocked = id; buildRecords();
      return true;
    }
    const VISIT_KEY = "fs01_visited";
    function loadVisited() { try { return JSON.parse(localStorage.getItem(VISIT_KEY)) || []; } catch (e) { return []; } }
    function markVisited(id) { const v = loadVisited(); if (!v.includes(id)) { v.push(id); try { localStorage.setItem(VISIT_KEY, JSON.stringify(v)); } catch (e) {} } }
    const TRIG_KEY = "fs01_triggers_done";
    function loadTrigDone() { try { return JSON.parse(localStorage.getItem(TRIG_KEY)) || {}; } catch (e) { return {}; } }
    function triggerDone(id) { return !!loadTrigDone()[id]; }
    function markTriggerDone(id) { const t = loadTrigDone(); t[id] = true; try { localStorage.setItem(TRIG_KEY, JSON.stringify(t)); } catch (e) {} }
    // 条件匹配器(条件对话页 + 触发器共用):flags 全满足 ∧ 线索数 ∧ 已访问章节 ∧ 持有道具
    function condsMet(c) {
      if (!c) return true;
      if (c.flags && c.flags.length && !c.flags.every(hasFlag)) return false;
      if (c.minClues && (loadRecords().length + loadCluesRevealed().length) < c.minClues) return false;
      if (c.visited && !loadVisited().includes(c.visited)) return false;
      if (c.hasItem && !hasItem(c.hasItem)) return false;
      return true;
    }
    // 倒计时随探索递减:每核验一条线索,时限逼近 —— 7天 → 5天 → 3天 → 今夜
    const CD_STAGES = [{ v: 7, u: "天" }, { v: 5, u: "天" }, { v: 3, u: "天" }, { v: "今夜", u: "" }];
    function buildCountdown(overrideN) {
      const cd = DATA.countdown; if (!cd) return;
      const n = (overrideN == null) ? loadRecords().length : overrideN;  // overrideN 仅供 ?cddemo= 演示/截图用,不动真实记录
      const s = CD_STAGES[Math.min(n, CD_STAGES.length - 1)];
      const tonight = (s.v === "今夜");
      $("#countdown").innerHTML = `<span class="cd-label">${cd.label}</span> <span class="cd-val${tonight ? ' tonight' : ''}">${s.v}</span> ${s.u}`;
    }
    // 世界图"已显影地点"记忆:新解锁的地点回到世界图时播一次显影动画
    const SEEN_KEY = "fs01_revealed_seen";
    function loadSeen() { try { return JSON.parse(localStorage.getItem(SEEN_KEY)) || []; } catch (e) { return []; } }
    function saveSeen(arr) { try { localStorage.setItem(SEEN_KEY, JSON.stringify(arr)); } catch (e) {} }
    function buildRecords() {
      const r = loadRecords(), br = loadBranches();
      const clues = getAllClues(), revealed = loadCluesRevealed(), inv = loadInventory();
      $("#recCount").textContent = (r.length + clues.filter(c => revealed.includes(c.id)).length) + "/" + (recordableCount() + clues.length);
      const list = $("#recList"); list.innerHTML = "";
      const got = DATA.chapters.filter(c => c.clue && r.includes(c.id));
      if (!got.length && !br.length && !revealed.length && !inv.length) {
        list.innerHTML = '<div class="rec-empty">还没有记录。走进一篇，和现场的单元对话——凤翎会记下它注意到的异常。</div>';
        if (clues.length) buildJournalSection(list, clues, revealed); // 空档案也显示"待揭露"占位——让读者知道还有东西可找
        return;
      }
      // M6 调查日志区(渐进列表:已揭露可展开,待揭露灰色占位)
      buildJournalSection(list, clues, revealed);
      // M6 持有道具区
      if (inv.length) {
        const sec = document.createElement("div"); sec.className = "rec-section";
        sec.innerHTML = '🔑 随身道具';
        list.appendChild(sec);
        const wrap = document.createElement("div"); wrap.className = "inv-chips";
        const names = {}; (DATA.chapters || []).forEach(c => (c.props || []).forEach(p => { if (p.givesItemId) names[p.givesItemId] = p.givesItemName; }));
        inv.forEach(id => { const chip = document.createElement("div"); chip.className = "inv-chip"; chip.textContent = "🔑 " + (names[id] || id); wrap.appendChild(chip); });
        list.appendChild(wrap);
      }
      // 核心线索区(走完整对话后留下)
      if (got.length) {
        const sec = document.createElement("div"); sec.className = "rec-section";
        sec.innerHTML = '核心线索';
        list.appendChild(sec);
        got.forEach(c => {
          const d = document.createElement("div"); d.className = "rec-card";
          d.innerHTML = `<div class="rc-code">${c.title} · ${c.place}</div><div class="rc-clue">${c.clue}</div>`;
          list.appendChild(d);
        });
      }
      // 分支痕迹区(选项触发的 outcome)
      if (br.length) {
        const all = getAllOutcomes();
        const sec = document.createElement("div"); sec.className = "rec-section";
        sec.innerHTML = '⚡ 分支痕迹 <em>凤翎当时的选择</em>';
        list.appendChild(sec);
        br.forEach(oid => {
          const o = all[oid]; if (!o) return;
          const card = document.createElement("div"); card.className = "rec-card branch";
          card.innerHTML = `<div class="rc-code">${o.title}</div><div class="rc-clue">${o.text}</div>`;
          list.appendChild(card);
        });
      }
    }
    // M6 调查日志渐进列表:已揭露=点击展开详情;待揭露=??? 占位(让读者知道"还有 N 条没找到")
    function buildJournalSection(list, clues, revealed) {
      if (!clues.length) return;
      const sec = document.createElement("div"); sec.className = "rec-section";
      const nGot = clues.filter(c => revealed.includes(c.id)).length;
      sec.innerHTML = `📋 调查日志 <em>${nGot}/${clues.length} 已揭露 · 点卡片展开</em>`;
      list.appendChild(sec);
      clues.forEach(cl => {
        const d = document.createElement("div");
        if (revealed.includes(cl.id)) {
          d.className = "rec-card clue" + (window.__lastClueUnlocked === cl.id ? " just-unlocked" : "");
          d.innerHTML = `<div class="rc-code">${cl.chTitle || ""}<span class="rc-expand">▾ 展开</span></div><div class="rc-clue">${cl.name}</div><div class="rc-detail">${cl.detail || ""}</div>`;
          d.onclick = () => { d.classList.toggle("open"); d.querySelector(".rc-expand").textContent = d.classList.contains("open") ? "▴ 收起" : "▾ 展开"; };
        } else {
          d.className = "rec-card clue-locked";
          d.innerHTML = `<div class="rc-code">？？？</div><div class="rc-clue">▒▒▒▒▒▒▒▒</div>`;
        }
        list.appendChild(d);
      });
      window.__lastClueUnlocked = null; // 解锁动画只播一次
    }
    function showClueToast(text, head) {
      const t = $("#clueToast"); t.innerHTML = `<b>${head || "线索已记入凤翎的私人记录"}</b>${text || ""}`;
      t.classList.remove("hide"); clearTimeout(window.__clueT); window.__clueT = setTimeout(() => t.classList.add("hide"), 3800);
    }

    // ===== DOM UI 切换 =====
    function showRoomUI(ch) {
      $("#worldmap").classList.add("hide");
      $("#topbar").classList.add("hide");
      $("#records").classList.add("hide");
      $("#detail").classList.add("hide");
      $("#backbar").classList.remove("hide");
      $("#roomhud").classList.remove("hide");
      const touchMode = matchMedia("(pointer: coarse)").matches || innerWidth <= 700;
      $("#roomhud").innerHTML = touchMode
        ? "轻点地面自动行走 · 点角色/物件可交互 · <b>横屏体验更佳</b>"
        : "用 <b>方向键 / WASD</b> 走动 · 也可点击地面自动寻路";
      $("#interactAction").innerHTML = touchMode ? "<b>轻点此处</b>" : "按 <b>空格</b>";
      const needsPropArt = !ch.room.bgImage && (ch.props || []).some(p => !p.sprite);
      $("#bbTitle").innerHTML = `${ch.title} · ${ch.name}　<b>${ch.place}</b>` +
        (needsPropArt ? `　<span style="font-size:10px;color:#8893a0;border:1px dashed #8893a055;border-radius:4px;padding:2px 7px;font-family:'Courier New',monospace;" title="创作者可随时用 AI 为该场景生成物件贴图">线框模式 · 待贴美术</span>` : "");
      // 从区域大地图进的设施:返回按钮指回区域;区域本身/直进设施:返回世界图
      const fromArea = (window.__fromArea && window.__fromArea !== ch.id) ? DATA.chapters.find(c => c.id === window.__fromArea) : null;
      // F7-A 读者模式:藏"返回世界"(那是创作者视角),返回键改"从头开始";顶部挂只读角标
      if (window.__readerMode) {
        const rb = $("#readerBadge"); if (rb) rb.classList.remove("hide");
        const bb = $("#backBtn");
        if (fromArea) { bb.textContent = `← 返回${fromArea.name}`; }
        else { bb.textContent = "↻ 从头开始"; bb.onclick = () => location.reload(); }
      } else {
        const rb = $("#readerBadge"); if (rb) rb.classList.add("hide");
        $("#backBtn").textContent = fromArea ? `← 返回${fromArea.name}` : "← 返回世界";
      }
    }
    // ===== 世界地图 v2(澜洲大陆:像素整图 + 9 区战雾 + 地点徽章 + 富档案面板) =====
    function locUnlocked(loc) { return !loc.requires || loadRecords().length >= loc.requires; }
    function curLocId() {
      const R = DATA.worldmapV2 && DATA.worldmapV2.region; if (!R) return null;
      const hit = R.locations.find(l => (l.facilities || []).some(f => f.ch === DATA.currentChapter));
      return hit ? hit.id : null;
    }
    function buildWorldMap() {
      const wm = $("#worldmap"); if (!wm) return;
      const W2 = DATA.worldmapV2;
      if (!W2) { wm.innerHTML = `<div style="color:#8893a0;font-family:'Courier New',monospace;">世界地图数据缺失(worldmapV2)</div>`; return; }
      const R = W2.region, cur = curLocId();
      const seen = loadSeen(); let seenChanged = false;
      const pts = R.locations.map(l => l.pos);
      let lines = "";
      for (let i = 0; i < pts.length - 1; i++) lines += `<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[i + 1][0]}" y2="${pts[i + 1][1]}"/>`;
      wm.innerHTML = `
        <div class="wm2-stage" id="wm2Stage">
          <img class="wm2-map" src="art/out/${W2.mapImage}.png" alt="澜洲">
          <div class="wm-hud tl">${W2.continent} 全境 · ${W2.progress}</div>
          <div class="wm-hud bl">${R.name} ${R.code} · 实时态势</div>
          <svg class="wm-lines" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>
        </div>`;
      const stage = $("#wm2Stage");
      // 8 个未测绘战雾区标签
      (W2.fogRegions || []).forEach(f => {
        const el = document.createElement("div");
        el.className = "wm2-fog";
        el.style.left = f.labelPos[0] + "%"; el.style.top = f.labelPos[1] + "%";
        el.innerHTML = `<span class="wm-nosignal">███区 · 未测绘</span>`;
        el.onclick = () => showClueToast("该区域尚未测绘——等小说写到那里。", "▒▒ NO SIGNAL");
        stage.appendChild(el);
      });
      // 开放区标签(点开区域档案)
      const rl = document.createElement("div");
      rl.className = "wm2-region";
      rl.style.left = R.labelPos[0] + "%"; rl.style.top = R.labelPos[1] + "%";
      rl.textContent = `◈ ${R.name} · ${R.code}`;
      rl.onclick = () => openRegionPanel(R);
      stage.appendChild(rl);
      // 3 个地点徽章
      R.locations.forEach(loc => {
        const unlocked = locUnlocked(loc);
        const isNew = unlocked && !seen.includes("loc_" + loc.id);
        if (isNew) { seen.push("loc_" + loc.id); seenChanged = true; }
        const isCur = loc.id === cur;
        const el = document.createElement("div");
        el.className = "wm2-loc" + (unlocked ? "" : " locked") + (isCur ? " current" : "") + (isNew ? " just-revealed" : "");
        el.style.left = loc.pos[0] + "%"; el.style.top = loc.pos[1] + "%";
        el.dataset.loc = loc.id;
        el.innerHTML = `
          <div class="wm2-badge" style="background-image:url(art/out/${loc.thumb}.png)">
            ${unlocked ? "" : `<span class="wm2-lock">🔒</span>`}
            ${isCur ? `<img class="wm2-hero" src="art/out/fengling_front.png" alt="">` : ""}
          </div>
          <div class="wm2-locname">${loc.name}</div>
          ${isCur ? `<div class="wm2-here">凤翎在此</div>` : ""}`;
        el.onclick = () => openLocPanel(loc);
        stage.appendChild(el);
      });
      if (seenChanged) saveSeen(seen);
      // E2E/调试钩子
      window.__wm2 = () => ({ fog: stage.querySelectorAll(".wm2-fog").length, locs: stage.querySelectorAll(".wm2-loc").length });
      const wmsel = new URLSearchParams(location.search).get("wmsel");
      if (wmsel) { const l = R.locations.find(x => x.id === wmsel); if (l) setTimeout(() => openLocPanel(l), 250); }
      if (new URLSearchParams(location.search).get("wmregion") === "1") setTimeout(() => openRegionPanel(R), 250);
      // E2E:?simclose=1 配合 wmsel/wmregion——开面板后点 × ,断言面板关上+地图回中(防 closeDetail 全局暴露回归)
      if (new URLSearchParams(location.search).get("simclose") === "1") setTimeout(() => {
        const btn = document.querySelector("#detail .dt-close");
        if (btn) btn.click();
        setTimeout(() => {
          const closed = $("#detail").classList.contains("hide") && !$("#worldmap").classList.contains("panel-open");
          const errs = (window.__E2E_ERR || []).length;
          const res = `SIMCLOSE closed=${closed} errs=${errs} ${closed && !errs ? "PASS" : "FAIL"}`;
          document.title = res;
          const dd = document.createElement("div"); dd.id = "simCloseOut"; dd.textContent = res;
          dd.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(dd);
        }, 350);
      }, 700);
    }

    // 关闭档案面板:收面板 + 地图回中 + 清选中态
    function closeDetail() {
      $("#detail").classList.add("hide");
      const wm = $("#worldmap"); if (wm) wm.classList.remove("panel-open");
      [...document.querySelectorAll(".wm2-loc.selected")].forEach(e => e.classList.remove("selected"));
    }
    window.closeDetail = closeDetail; // ⚠️ 主脚本在 IIFE 里,内联 onclick 解析于全局——必须显式挂 window,否则 × 按钮 ReferenceError(审查发现的 P0)
    // 面板打开的公共动作:地图左移让位(Google Maps panTo 范式) + 标记选中徽章
    function panelOpenFx(locId) {
      const wm = $("#worldmap"); if (wm && !wm.classList.contains("hide")) wm.classList.add("panel-open");
      [...document.querySelectorAll(".wm2-loc.selected")].forEach(e => e.classList.remove("selected"));
      if (locId) { const el = document.querySelector(`.wm2-loc[data-loc="${locId}"]`); if (el) el.classList.add("selected"); }
    }

    // 地点档案面板(缩略图/简介/可进入设施/人物)
    function openLocPanel(loc) {
      panelOpenFx(loc.id);
      const unlocked = locUnlocked(loc);
      const isCur = loc.id === curLocId();
      const status = !unlocked ? "🔒 未解锁" : isCur ? "凤翎在此" : "可进入";
      const charsHtml = (loc.chars || []).map(c =>
        `<div class="dp-person"><img src="art/out/${c[0]}.png"><span>${c[1]}</span><small>${c[2]}</small></div>`).join("");
      const facHtml = (loc.facilities || []).map(f => {
        const ch = DATA.chapters.find(c => c.id === f.ch);
        const ok = ch && chapterUnlocked(ch);
        return ok
          ? `<button class="dt-fac" onclick="window.__enterRoom('${f.ch}')">▶ ${f.name}<small>${ch.title} · ${ch.name}</small></button>`
          : `<div class="dt-fac locked">🔒 ${f.name}<small>${(ch && ch.lockHint) || "尚未解锁"}</small></div>`;
      }).join("");
      $("#detail").innerHTML = `
        <button class="dt-close" onclick="closeDetail()">×</button>
        <div class="dt-code">${DATA.worldmapV2.region.name} · ${DATA.worldmapV2.region.code}　<span class="dt-status">${status}</span></div>
        <h2 class="dt-name">${loc.name}</h2>
        <div class="dt-place">${loc.sub}</div>
        <div class="dt-thumb" style="background-image:url(art/out/${loc.thumb}.png)"></div>
        <div class="dt-hook">${loc.desc}</div>
        ${unlocked
          ? `${loc.areaCh ? `<button class="dt-enter" onclick="window.__enterRoom('${loc.areaCh}')">▶ 进入 ${loc.name}</button>` : ""}
             <div class="dt-sec">直达设施</div>${facHtml}
             <div class="dt-sec">相关单元</div><div class="dt-people">${charsHtml}</div>`
          : `<div class="dt-locked">🔒 需核验 ${loc.requires} 条线索后解锁——先去其他地点探索</div>`}`;
      $("#detail").classList.remove("hide");
    }

    // 区域档案面板(故事主线 + 关键历史节点)
    function openRegionPanel(R) {
      panelOpenFx(null);
      const tl = (R.nodes || []).map(n =>
        `<div class="dt-tl-item"><div class="dt-tl-year">${n.year}</div><div class="dt-tl-body"><b>${n.title}</b><span>${n.text}</span></div></div>`).join("");
      $("#detail").innerHTML = `
        <button class="dt-close" onclick="closeDetail()">×</button>
        <div class="dt-code">澜洲 · 开放区域　<span class="dt-status">测绘完成</span></div>
        <h2 class="dt-name">${R.name} · ${R.code}</h2>
        <div class="dt-place">管控区 · 缓冲秩序运行中</div>
        <div class="dt-hook">${R.storyline}</div>
        <div class="dt-sec">关键历史节点</div>
        <div class="dt-tl">${tl}</div>
        <div class="dt-sec">提示</div>
        <div class="dt-hook" style="color:#8893a0;">点地图上的地点徽章，查看档案并进入现场。</div>`;
      $("#detail").classList.remove("hide");
    }

    // ===== 凤翎工坊 · 世界编辑器(拖 NPC / 刷碰撞 / 一键保存 / 试玩 / 引导)=====
    let ED = null;
    function setupEditor(chId) {
      const ch = DATA.chapters.find(c => c.id === chId);
      if (!ch) { showErr("找不到篇：" + chId); return; }
      const room = ch.room, COLS = room.cols, ROWS = room.rows;
      // 初始化碰撞网格(从 walkable 或边界自动生成)
      const grid = [];
      for (let y = 0; y < ROWS; y++) { const r = [];
        for (let x = 0; x < COLS; x++) {
          let v = (x === 0 || y === 0 || x === COLS - 1 || y === ROWS - 1) ? 1 : 0;
          if (room.walkable && room.walkable[y]) v = room.walkable[y][x] === "1" ? 1 : 0;
          r.push(v); } grid.push(r); }
      // tile 模式章节(ch1-3)的内墙存在 innerWalls 而非 walkable——必须烧进网格,否则编辑器显示空房且一保存就把游戏内墙静默删光(审查发现的 P0)
      (room.innerWalls || []).forEach(([wx, wy]) => { if (grid[wy] && grid[wy][wx] !== undefined) grid[wy][wx] = 1; });
      // 初始化 NPC 和 spawn(从 chapters.json 深拷贝可拖位置)
      const npcs = (ch.npcs || []).map(n => ({ id: n.id, name: n.name, pos: [...n.pos], img: NPC_TEX[n.id] || "qinwang_front", noSprite: !!n.noSprite,
        silent: !!n.silent, dockSize: n.dockSize || 0,
        dialogue: JSON.parse(JSON.stringify(n.dialogue || { start: 0, nodes: [] })),
        dialogPages: n.dialogPages ? JSON.parse(JSON.stringify(n.dialogPages)) : null,
        behavior: n.behavior || "static", range: n.range || 3, waypoints: (n.waypoints || []).map(w => [...w]) })); // M5 行为 + 对话字段进编辑器
      const spawn = [...room.spawn];
      // 初始化 props(底图里的装饰品,可拖、可勾障碍、可标可交互)
      const props = (ch.props || []).map(p => ({
        ...p, // 展开保留未知键(配合 server 端 merge,schema 可前向演进)
        pos: [...p.pos], size: [...p.size],
        isObstacle: !!p.isObstacle, isInteractable: !!p.isInteractable,
        prompt: p.prompt || "", fromBg: !!p.fromBg,
        movable: !!p.movable, sprite: p.sprite || null, interactText: p.interactText || ""
      }));
      const gates = (ch.gates || []).map(g => ({ ...g, at: [...g.at] })); // 大门可拖可设置(用户反馈:传送口不该是死的)
      ED = { ch, room, COLS, ROWS, grid, npcs, spawn, props, gates, actorSize: room.actorSize || 0, brush: "wall", painting: false, dirty: false, drag: null, selectedProp: null, selectedNpc: null, selectedGate: null };
      ["#worldmap", "#topbar", "#detail", "#records", "#backbar", "#roomhud", "#dialog"].forEach(s => { const el = $(s); if (el) el.classList.add("hide"); });
      $("#editor").classList.remove("hide");
      const stage = $("#edStage");
      stage.style.aspectRatio = COLS + " / " + ROWS;
      // 画板留白:取屏幕宽 80vw 与基于格数的合理上限的较小者;格子更精细
      stage.style.width = "min(80vw, " + (COLS * 42) + "px)";
      stage.style.maxHeight = "78vh";
      stage.style.backgroundImage = room.bgImage ? `url(art/out/${room.bgImage}.png)` : "none";
      if (room.bgImage) deriveStreetMask(room.bgImage); // 地貌语义:识别街道,拖楼压街实时警告
      stage.style.backgroundColor = room.bgImage ? "transparent" : "#121620";
      // 5 格大坐标线
      stage.classList.add("has-grid");
      stage.style.setProperty("--ed-grid-x", (100 / COLS * 5) + "%");
      stage.style.setProperty("--ed-grid-y", (100 / ROWS * 5) + "%");
      // 画板框定(UI 方案2):标题条 + 比例角标,像 IDE 打开了一个文件
      let ft = stage.querySelector(".ed-frame-title");
      if (!ft) { ft = document.createElement("div"); ft.className = "ed-frame-title"; stage.appendChild(ft); }
      ft.textContent = `MAP · ${ch.name}`;
      let fb = stage.querySelector(".ed-frame-badge");
      if (!fb) { fb = document.createElement("div"); fb.className = "ed-frame-badge"; stage.appendChild(fb); }
      fb.textContent = `${COLS}×${ROWS} 格 · 16px/格`;
      const g = $("#edGrid");
      g.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
      g.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;
      renderEditor();
      // 刷格事件(拖 NPC 时禁用)
      g.onmousedown = e => {
        if (ED.drag) return;
        if (ED.brush !== "wall" && ED.brush !== "walk") return; // 只有刷子模式才刷格
        ED.painting = true; paintCell(e.target);
      };
      g.onmouseover = e => { if (ED.painting && !ED.drag) paintCell(e.target); };
      window.addEventListener("mouseup", () => { if (ED) { ED.painting = false; finishDrag(); } });
      stage.addEventListener("mousemove", e => { if (ED && ED.drag) dragMove(e); });
      // 调试钩子
      window.__editor = () => ED;
      window.__edRender = renderEditor;
      window.__edSave = saveChapter;
      // 3 步引导(首次自动弹)
      if (!localStorage.getItem("fs01_editor_onboard")) setTimeout(showOnboarding, 350);
      // debug:?autoselect=propId 自动选中 prop 显示属性面板(用于截图验证)
      const autoSel = new URLSearchParams(location.search).get("autoselect");
      if (autoSel) {
        const p = (ED.props || []).find(x => x.id === autoSel);
        const n = (ED.npcs || []).find(x => x.id === autoSel);
        if (p) setTimeout(() => { ED.selectedProp = p.id; renderInspector(); renderEditorProps(); }, 200);
        else if (n) setTimeout(() => { ED.selectedNpc = n.id; renderInspector(); }, 200); // NPC 也可自动选中(截图行为面板)
      }
      // debug:?sizes=1 自动打开角色尺寸工作台(用于截图验证)
      if (new URLSearchParams(location.search).get("sizes") === "1") setTimeout(openSizePanel, 300);
      // F7-A:?autopublish=1 自动开发布卡(截图);=brokengate 临时坏门展示拦截卡(纯内存,不落盘)
      const autopub = new URLSearchParams(location.search).get("autopublish");
      if (autopub) setTimeout(() => {
        if (autopub === "brokengate" && (ED.ch.gates || []).length) ED.ch.gates[0].at = [0, 0]; // 内存改,不保存=不落盘
        publishChapter();
      }, 400);
      const simpub = new URLSearchParams(location.search).get("simpublish");
      if (simpub) setTimeout(() => {
        let testCh = ED.ch;
        if (simpub === "brokengate" && (ED.ch.gates || []).length) {
          testCh = JSON.parse(JSON.stringify(ED.ch)); testCh.gates[0].at = [0, 0]; // 边界=墙,必不可达,验 error 路径
        }
        const res = validateForPublish(testCh);
        const errs = res.issues.filter(i => i.level === "error").length;
        const want = (simpub === "brokengate") ? !res.ok : res.ok; // brokengate 期望失败,其余期望通过
        const out = `SIMPUBLISH mode=${simpub} ok=${res.ok} checks=${res.checks} errs=${errs} link=${res.ok ? shareLink().slice(-24) : "none"} ${want ? "PASS" : "FAIL"}`;
        document.title = out;
        const d = document.createElement("div"); d.id = "simPubOut"; d.textContent = out;
        d.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(d);
      }, 400);
      // debug:?autoai=1 自动打开 AI 助手抽屉
      if (new URLSearchParams(location.search).get("autoai") === "1") setTimeout(openAIPanel, 300);
      // E2E:?simbake=1 等街道识别完成→点「烘焙语义」→报告落盘结果(走编辑器真实链路)
      if (new URLSearchParams(location.search).get("simbake") === "1" && !window.__simbakeDone) {
        window.__simbakeDone = true;
        window.__onStreetMask = async () => { // 街道识别完成才动手(回调驱动,虚拟时间安全)
          const bk = $("#esBake");
          let res;
          if (!bk) res = "SIMBAKE NOBTN FAIL";
          else {
            bk.click();
            await new Promise(r => setTimeout(r, 1200));
            try {
              const fresh = await (await fetch("chapters.json?_=" + Date.now())).json();
              const sem = (fresh.chapters.find(c => c.id === ED.ch.id).room || {}).semantics;
              const roadN = sem && sem.roads ? sem.roads.join("").split("1").length - 1 : 0;
              res = `SIMBAKE ground=${sem && sem.ground ? sem.ground.length : 0}rows roads=${roadN}cells ${sem && sem.ground ? "PASS" : "FAIL"}`;
            } catch (e) { res = "SIMBAKE EXC " + e.message + " FAIL"; }
          }
          document.title = res;
          const dd = document.createElement("div"); dd.id = "simBakeOut"; dd.textContent = res;
          dd.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(dd);
        };
      }
      // 取证:?streets=1 街道识别完成后自动开启叠加(截图用)
      if (new URLSearchParams(location.search).get("streets") === "1") {
        window.__onStreetMask = () => { ED.showStreets = true; renderEditorBar(); renderEditorGrid(); };
      }
      // debug:?autocmd=1 自动打开 AI 命令抽屉(截图取证) / E2E:?aicmd=<urlencoded指令> 自动执行并把结果写 DOM
      if (new URLSearchParams(location.search).get("autocmd") === "1" && !window.__autocmdDone) { window.__autocmdDone = true; setTimeout(toggleCmdBar, 300); }
      const aicmd = new URLSearchParams(location.search).get("aicmd");
      if (aicmd && !window.__aicmdDone) { window.__aicmdDone = true; setTimeout(async () => {
        let res;
        try {
          const r = await (await fetch("/api/ai-command", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: aicmd, chapterId: ED.ch.id })
          })).json();
          res = `AICMD ok=${r.ok} engine=${r.engine || "?"} ${r.ok ? `intent=${(r.intent || {}).intent} pos=${JSON.stringify(r.pos || "")} beh=${r.behavior || ""}` : `err=${(r.error || "").slice(0, 40)}`} ${r.ok ? "PASS" : "FAIL"}`;
          if (r.ok) await hotReloadChapter(r.propId || null);
        } catch (e) { res = `AICMD EXC ${e.message} FAIL`; }
        document.title = res;
        const dd = document.createElement("div"); dd.id = "aiCmdOut"; dd.textContent = res;
        dd.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(dd);
      }, 600); }
      // debug/E2E:?simdrag=unitId:gx,gy 模拟真实鼠标拖动一个 prop 或 npc(派发真事件→跑真处理器)→结果写进 DOM,验证 拖动→数据→(可选)存盘 链路
      const sim = new URLSearchParams(location.search).get("simdrag");
      if (sim) setTimeout(() => {
        try {
          const [pid, xy] = sim.split(":"); const [tx, ty] = xy.split(",").map(Number);
          const stage = $("#edStage");
          const findUnit = () => {
            const u = ED.props.find(x => x.id === pid) || ED.npcs.find(x => x.id === pid);
            if (u) return u;
            const g = (ED.gates || []).find(x => x.to === pid);
            return g ? { pos: g.at } : null; // 大门适配:探针统一读 .pos
          };
          const unit = findUnit();
          const el = stage.querySelector(`.ed-prop[data-id="${pid}"], .ed-pawn[data-id="${pid}"], .ed-gate[data-id="${pid}"]`);
          if (!unit || !el) throw new Error("找不到单元 " + pid);
          const r = stage.getBoundingClientRect();
          const cw = r.width / ED.COLS, chh = r.height / ED.ROWS;
          const before = JSON.stringify(unit.pos);
          const sx = r.left + (unit.pos[0] + 0.5) * cw, sy = r.top + (unit.pos[1] + 0.5) * chh;
          const ex = r.left + (tx + 0.5) * cw, ey = r.top + (ty + 0.5) * chh;
          // mousedown 打在单元上;mousemove/up 派在 stage 上并冒泡 → 同时触达 prop 的 window 处理器 & npc 的 stage 处理器
          const fire = (type, x, y, tgt) => tgt.dispatchEvent(new MouseEvent(type, { clientX: x, clientY: y, bubbles: true }));
          fire("mousedown", sx, sy, el);
          fire("mousemove", sx + 12, sy + 12, stage);
          fire("mousemove", ex, ey, stage);
          fire("mouseup", ex, ey, stage);
          const after = findUnit();
          const moved = JSON.stringify(after.pos) !== before;
          const report = (extra) => {
            const res = `SIMDRAG pid=${pid} before=${before} after=${JSON.stringify(after.pos)} moved=${moved} dirty=${ED.dirty} ${extra || ""} ${moved ? "PASS" : "FAIL"}`;
            document.title = res;
            let d = document.getElementById("simResult");
            if (!d) { d = document.createElement("div"); d.id = "simResult"; d.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:18px monospace;padding:10px;white-space:pre"; document.body.appendChild(d); }
            d.textContent = res;
          };
          // simsave=1:连保存一起验(拖→存盘全链路)
          if (new URLSearchParams(location.search).get("simsave") === "1") {
            saveChapter().then(() => report("SAVED-to-disk")).catch(e => report("SAVE-ERR:" + e.message));
          } else { report(); }
        } catch (e) { document.title = "SIMDRAG ERROR " + e.message; const d = document.createElement("div"); d.id = "simResult"; d.textContent = "SIMDRAG ERROR " + e.message; document.body.appendChild(d); }
      }, 700);
    }

    function renderEditor() {
      renderEditorTop();
      renderEditorBar();
      renderEditorGrid();
      renderEditorProps();
      renderEditorPawns();
      renderEditorFoot();
      renderInspector();
      renderEditorGates();
    }

    // 区域大门(传送口):可拖动改位置、可点选改名;拖进死区会被保存时的 BFS 防呆拦下
    function renderEditorGates() {
      [...document.querySelectorAll("#edStage > .ed-gate")].forEach(el => el.remove());
      const stage = $("#edStage");
      (ED.gates || []).forEach((g, gi) => {
        const el = document.createElement("div");
        el.className = "ed-gate" + (ED.selectedGate === gi ? " selected" : "");
        el.dataset.id = g.to;
        el.style.left = (g.at[0] * 100 / ED.COLS) + "%";
        el.style.top = (g.at[1] * 100 / ED.ROWS) + "%";
        el.style.width = (100 / ED.COLS) + "%";
        el.style.height = (100 / ED.ROWS) + "%";
        el.innerHTML = `<span>🚪 ${g.label}</span>`;
        // 拖动(同 prop 范式:mousedown 后位移超阈值=拖,否则=点选)
        let started = false, dx0 = 0, dy0 = 0;
        el.onmousedown = ev => {
          ev.preventDefault(); ev.stopPropagation();
          dx0 = ev.clientX; dy0 = ev.clientY; started = false;
          const move = mv => {
            if (!started && (Math.abs(mv.clientX - dx0) > 4 || Math.abs(mv.clientY - dy0) > 4)) {
              started = true; el.classList.add("dragging");
            }
            if (!started) return;
            const r = stage.getBoundingClientRect();
            const gx = Math.max(1, Math.min(ED.COLS - 2, Math.floor((mv.clientX - r.left) / (r.width / ED.COLS))));
            const gy = Math.max(1, Math.min(ED.ROWS - 2, Math.floor((mv.clientY - r.top) / (r.height / ED.ROWS))));
            if (gx !== g.at[0] || gy !== g.at[1]) { g.at = [gx, gy]; el.style.left = (gx * 100 / ED.COLS) + "%"; el.style.top = (gy * 100 / ED.ROWS) + "%"; markDirty(); }
          };
          const up = () => {
            window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up);
            el.classList.remove("dragging");
            if (!started) { ED.selectedGate = (ED.selectedGate === gi ? null : gi); ED.selectedProp = null; ED.selectedNpc = null; renderInspector(); renderEditorGates(); }
          };
          window.addEventListener("mousemove", move);
          window.addEventListener("mouseup", up);
        };
        stage.appendChild(el);
      });
    }

    // 渲染底图装饰品 props(虚线方框+名字,可拖,可点选)
    function renderEditorProps() {
      [...document.querySelectorAll("#edStage > .ed-prop")].forEach(el => el.remove());
      const stage = $("#edStage");
      (ED.props || []).forEach(p => {
        const movable = !!p.movable;
        const el = document.createElement("div");
        el.className = "ed-prop " + (movable ? "movable" : "fixed") + (p.sprite ? " has-sprite" : "") + (p.isObstacle ? " obstacle" : "") + (ED.selectedProp === p.id ? " selected" : "");
        el.style.left = (p.pos[0] * 100 / ED.COLS) + "%";
        el.style.top = (p.pos[1] * 100 / ED.ROWS) + "%";
        el.style.width = (p.size[0] * 100 / ED.COLS) + "%";
        el.style.height = (p.size[1] * 100 / ED.ROWS) + "%";
        el.dataset.id = p.id;
        // 有 sprite 的物件在编辑器中直接显示贴图；movable 仍允许拖动，fixed 只允许点选改属性。
        if (p.sprite) el.style.backgroundImage = `url(art/out/${p.sprite}.png)`;
        el.innerHTML = `<div class="ed-prop-label">${movable ? "✋ " : "🔒 "}${p.name}</div>`;
        // 点选 vs 拖:mousedown 后等 mousemove 才进入拖(仅 movable),否则点选
        let dragStarted = false, downX = 0, downY = 0;
        el.onmousedown = ev => {
          ev.preventDefault(); ev.stopPropagation();
          downX = ev.clientX; downY = ev.clientY; dragStarted = false;
          const move = mv => {
            if (movable && !dragStarted && (Math.abs(mv.clientX - downX) > 4 || Math.abs(mv.clientY - downY) > 4)) {
              dragStarted = true;
              ED.drag = { el, type: "prop", id: p.id, startGX: p.pos[0], startGY: p.pos[1], lastGX: p.pos[0], lastGY: p.pos[1] };
              el.classList.add("dragging");
            }
            if (dragStarted) propDragMove(mv);
          };
          const up = () => {
            window.removeEventListener("mousemove", move);
            window.removeEventListener("mouseup", up);
            if (dragStarted) propDragEnd();
            else { ED.selectedProp = (ED.selectedProp === p.id ? null : p.id); ED.selectedNpc = null; renderInspector(); renderEditorProps(); }
          };
          window.addEventListener("mousemove", move);
          window.addEventListener("mouseup", up);
        };
        stage.appendChild(el);
      });
    }

    function propDragMove(e) {
      if (!ED.drag || ED.drag.type !== "prop") return;
      const stage = $("#edStage");
      const r = stage.getBoundingClientRect();
      const cellW = r.width / ED.COLS, cellH = r.height / ED.ROWS;
      let gx = Math.floor((e.clientX - r.left) / cellW - 0.5);
      let gy = Math.floor((e.clientY - r.top) / cellH - 0.5);
      const p = ED.props.find(x => x.id === ED.drag.id);
      if (!p) return;
      gx = Math.max(0, Math.min(ED.COLS - p.size[0], gx));
      gy = Math.max(0, Math.min(ED.ROWS - p.size[1], gy));
      ED.drag.lastGX = gx; ED.drag.lastGY = gy;
      ED.drag.el.style.left = (gx * 100 / ED.COLS) + "%";
      ED.drag.el.style.top = (gy * 100 / ED.ROWS) + "%";
    }

    function propDragEnd() {
      if (!ED.drag || ED.drag.type !== "prop") return;
      const { id, lastGX, lastGY, startGX, startGY, el } = ED.drag;
      el.classList.remove("dragging");
      const p = ED.props.find(x => x.id === id);
      if (p && (lastGX !== startGX || lastGY !== startGY)) {
        // 拖之前先把旧位置的障碍清掉
        if (p.isObstacle) applyPropObstacle(p, false);
        p.pos = [lastGX, lastGY];
        if (p.isObstacle) applyPropObstacle(p, true);
        warnIfOnStreet(p); // 地貌语义:压街警告(不拦截)
        markDirty();
        renderEditorGrid();
        renderEditorFoot();
      }
      ED.drag = null;
    }

    // 应用 prop 障碍属性到 walkable 网格(覆盖 prop 占据的格子)
    function applyPropObstacle(p, on) {
      // 写入(on=true):只写碰撞脚印=底部 footprint 行(缺省=整框,兼容存量无 footprint 物件)
      // 清除(on=false):清整框——旧档可能烘焙过整框墙(footprint 概念之前的存档),只清脚印会留幽灵墙
      const fp = on ? (p.footprint || p.size[1]) : p.size[1];
      const y0 = p.pos[1] + p.size[1] - fp;
      for (let y = Math.max(0, y0); y < Math.min(ED.ROWS, p.pos[1] + p.size[1]); y++) {
        for (let x = p.pos[0]; x < Math.min(ED.COLS, p.pos[0] + p.size[0]); x++) {
          ED.grid[y][x] = on ? 1 : 0;
        }
      }
    }

    // 右侧 Inspector 分发:选中 prop→属性 / 选中 NPC→信息 / 都没选→默认提示+单元清单
    function renderInspector() {
      const panel = $("#edInspector");
      if (!panel || !ED) return;
      const prop = ED.selectedProp ? (ED.props || []).find(p => p.id === ED.selectedProp) : null;
      const npc = ED.selectedNpc ? (ED.npcs || []).find(n => n.id === ED.selectedNpc) : null;
      if (ED.selectedGate != null && ED.gates && ED.gates[ED.selectedGate]) return renderGateInspector(panel, ED.gates[ED.selectedGate]);
      if (prop) return renderPropInspector(panel, prop);
      if (npc) return renderNpcInspector(panel, npc);
      // 默认空态 + 单元清单(点行可选)
      const items = [];
      (ED.gates || []).forEach((g, gi) => items.push({ id: "gate#" + gi, kind: "gate", ic: "🚪", name: g.label, pos: g.at }));
      (ED.props || []).forEach(p => items.push({ id: p.id, kind: "prop", ic: p.movable ? "✋" : "🔒", name: p.name, pos: p.pos }));
      (ED.npcs || []).forEach(n => items.push({ id: n.id, kind: "npc", ic: n.noSprite ? "◎" : "🎭", name: n.name, pos: n.pos }));
      items.push({ id: "__spawn", kind: "spawn", ic: "🚩", name: "起点", pos: ED.spawn });
      const curAS = ED.actorSize || 0;
      panel.innerHTML = `
        <div class="ins-empty"><span class="ins-ic">🧩</span>点画板上的<b>物件</b>或 <b>NPC</b> 看属性<br>也可从下面清单选</div>
        <div class="ins-list" style="margin-bottom:10px">
          <div class="ins-list-label">⚙ 章节设置</div>
          <label class="pp-label" style="margin-top:6px">角色尺寸 <small style="color:#6a7585;font-weight:400">主角和 NPC 在本图里的大小</small></label>
          <select id="edActorSize" style="width:100%">
            <option value="0" ${curAS === 0 ? "selected" : ""}>默认（小房间大 / 区域图小）</option>
            <option value="24" ${curAS === 24 ? "selected" : ""}>小 · 24px</option>
            <option value="48" ${curAS === 48 ? "selected" : ""}>大 · 48px</option>
            <option value="96" ${curAS === 96 ? "selected" : ""}>特大 · 96px</option>
          </select>
        </div>
        <div class="ins-list">
          <div class="ins-list-label">本场景单元 (${items.length})</div>
          ${items.map(it => `<div class="il-row" data-id="${it.id}" data-kind="${it.kind}"><span class="il-ic">${it.ic}</span> ${it.name}<span class="il-pos">${it.pos[0]},${it.pos[1]}</span></div>`).join("")}
        </div>`;
      const asSel = $("#edActorSize");
      if (asSel) asSel.onchange = ev => { ED.actorSize = parseInt(ev.target.value) || 0; markDirty(); };
      panel.querySelectorAll(".il-row").forEach(row => {
        row.onclick = () => {
          const id = row.dataset.id, kind = row.dataset.kind;
          ED.selectedProp = kind === "prop" ? id : null;
          ED.selectedNpc = kind === "npc" ? id : null;
          ED.selectedGate = kind === "gate" ? +id.split("#")[1] : null;
          renderInspector(); renderEditorProps(); renderEditorGates();
        };
      });
    }

          <button class="pp-close" id="ppClose">×</button>

        ${p.requiresItem ? `<label class="pp-label">锁定提示</label><textarea id="ppLockedHint" rows="2" placeholder="如:面板亮着红灯——需要值守级别的密卡。">${(p.lockedHint || "").replace(/</g, "&lt;")}</textarea>` : ""}` : ""}
        <label class="pp-label">提示词(用于 AI 重生成此物体)</label>
        <textarea id="ppPrompt" rows="4">${p.prompt}</textarea>
        ${p.movable ? `<button class="pp-regen" id="ppDup" style="margin-bottom:6px">⧉ 复制此物件<small style="font-weight:400;opacity:.7">　同款再摆一个,填满街区</small></button>` : ""}
        <button class="pp-regen" id="ppRegen">✨ AI 重新生成<span class="pp-mock-tag">mock 演示</span></button>

    // 平台能力:地貌语义识别——从底图提取"街道格"(暗带),拖楼压街实时警告(2026-06-12 压街事故的系统级修复)
    function deriveStreetMask(bgKey) {
      ED.streetMask = null;
      const img = new Image();
      img.onload = () => {
        try {
          const cv = document.createElement("canvas");
          cv.width = img.naturalWidth; cv.height = img.naturalHeight;
          const ctx = cv.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const T = Math.round(img.naturalWidth / ED.COLS); // 每格像素(通常16)
          const data = ctx.getImageData(0, 0, cv.width, cv.height).data;
          const lum = [];
          for (let gy = 0; gy < ED.ROWS; gy++) {
            const row = [];
            for (let gx = 0; gx < ED.COLS; gx++) {
              let s = 0, n = 0;
              for (let yy = 2; yy < T; yy += 5) for (let xx = 2; xx < T; xx += 5) {
                const i = ((gy * T + yy) * cv.width + gx * T + xx) * 4;
                s += (data[i] + data[i+1] + data[i+2]) / 3; n++;
              }
              row.push(s / n);
            }
            lum.push(row);
          }
          const flat = lum.flat().slice().sort((a, b) => a - b);
          const med = flat[flat.length >> 1], p10 = flat[Math.floor(flat.length / 10)];
          const th = med - (med - p10) * 0.45;
          const mask = lum.map(row => row.map(v => v < th ? 1 : 0));
          const frac = mask.flat().reduce((a, b) => a + b, 0) / (ED.COLS * ED.ROWS);
          // 仅当"确有路网"才启用:暗带占比合理 且 存在贯穿性大道(整行/整列 60%+ 是暗带)
          const avenue = mask.some(r => r.reduce((a, b) => a + b, 0) > ED.COLS * 0.6) ||
            Array.from({ length: ED.COLS }, (_, x) => mask.reduce((a, r) => a + r[x], 0)).some(c => c > ED.ROWS * 0.6);
          if (frac > 0.08 && frac < 0.35 && avenue) ED.streetMask = mask;
          if (window.__onStreetMask) { const cb = window.__onStreetMask; window.__onStreetMask = null; cb(); } // E2E:识别完成回调(虚拟时间下轮询不可靠)
          // 探针:?streetprobe=1 输出语义层状态(E2E 验"编辑器认得街道")
          if (new URLSearchParams(location.search).get("streetprobe") === "1") {
            const el = document.createElement("div");
            el.id = "streetprobe";
            el.textContent = `STREETMASK ${ED.streetMask ? "ON" : "OFF"} frac=${Math.round(frac * 100)} cols=${ED.COLS}`;
            document.body.appendChild(el);
          }
        } catch (e) { /* 语义识别失败不影响编辑器 */ }
      };
      img.src = `art/out/${bgKey}.png`;
    }
    // 拖放后压街检查:大体量障碍物件盖住街道格 >12% → 警告(不拦截,创作者可坚持)
    function warnIfOnStreet(p) {
      if (!ED.streetMask || !p.isObstacle || p.size[0] < 3) return;
      let c = 0, t = 0;
      for (let y = p.pos[1]; y < Math.min(ED.ROWS, p.pos[1] + p.size[1]); y++)
        for (let x = p.pos[0]; x < Math.min(ED.COLS, p.pos[0] + p.size[0]); x++) { c += ED.streetMask[y][x]; t++; }
      if (t && c / t > 0.12) showEdToast(`⚠️ ${p.name} 压到街道了（${Math.round(c * 100 / t)}%）——建议放进街区里`, true);
    }

    // 平台能力:复制物件(同 sprite 再摆一份)——创作者自助加密度,不用重新生图
    function duplicateProp(p) {
      let n = 2, nid = `${p.id}_${n}`;
      while ((ED.props || []).some(x => x.id === nid)) { n++; nid = `${p.id}_${n}`; }
      const np = JSON.parse(JSON.stringify(p));
      np.id = nid;
      // 落点:原位右移一个身位,出界就左移;仍重叠由创作者拖开(有保存防呆兜底)
      np.pos = [Math.min(ED.COLS - p.size[0], p.pos[0] + p.size[0] + 1), p.pos[1]];
      if (np.pos[0] === p.pos[0]) np.pos[0] = Math.max(0, p.pos[0] - p.size[0] - 1);
      ED.props.push(np);
      if (np.isObstacle) applyPropObstacle(np, true);

    }
