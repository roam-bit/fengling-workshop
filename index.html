    // ===== F7-A 发布门:发布前聚合校验(真实)→ 通过才出只读分享链接 =====
    // 复用游戏侧 buildRoom 的碰撞网格 + BFS,确保"读者打开能玩通"才放行
    function bfsReach(grid, sx, sy) {
      const seen = new Set();
      if (!grid[sy] || grid[sy][sx] === 1) return seen;
      seen.add(sx + "," + sy); const q = [[sx, sy]];
      while (q.length) {
        const [x, y] = q.pop();
        for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
          const nx = x + dx, ny = y + dy;
          if (grid[ny] && grid[ny][nx] === 0 && !seen.has(nx + "," + ny)) { seen.add(nx + "," + ny); q.push([nx, ny]); }
        }
      }
      return seen;
    }
    function validateForPublish(ch) {
      const issues = []; const room = ch.room || {};
      if (!room.cols || !room.rows || !room.spawn) { issues.push({ level: "error", msg: "地图基础数据缺失(尺寸/出生点)" }); return { ok: false, issues, checks: 0 }; }
      let checks = 1; // 基础数据
      if (room.walkable && (room.walkable.length !== room.rows || room.walkable.some(r => r.length !== room.cols)))
        issues.push({ level: "error", msg: `碰撞层尺寸与地图不符(应 ${room.cols}×${room.rows})` });
      const grid = buildRoom(room); const [sx, sy] = room.spawn;
      checks++; // 出生点
      if (grid[sy] && grid[sy][sx] === 1) issues.push({ level: "error", msg: "出生点落在墙里——读者一进来就卡死" });
      const seen = bfsReach(grid, sx, sy);
      (ch.gates || []).forEach(g => {
        checks++;
        if (!seen.has(g.at[0] + "," + g.at[1])) issues.push({ level: "error", msg: `出口「${g.label}」从出生点走不到——读者会被困住` });
        if (!DATA.chapters.some(c => c.id === g.to)) issues.push({ level: "error", msg: `出口「${g.label}」指向的场景不存在` });
      });
      checks++; // 可玩单元
      const playable = (ch.npcs || []).length + (ch.props || []).filter(p => p.isInteractable).length;
      if (playable === 0) issues.push({ level: "warn", msg: "没有任何可对话/可交互单元,读者只能走来走去" });
      // 底图模式连通率(可走格占比过低=读者活动空间太小,提示但不拦)
      if (room.walkable) {
        const open = room.walkable.join("").split("0").length - 1;
        if (open < 20) issues.push({ level: "warn", msg: `可走空间只有 ${open} 格,场景偏挤` });
      }
      return { ok: !issues.some(i => i.level === "error"), issues, checks };
    }
    function publishChapter() {
      if (ED.dirty) { showEdToast("有未保存的改动——先 💾 保存,再发布(发布的是已保存的版本)", true); return; }
      showPublishCard(ED.ch, validateForPublish(ED.ch));
    }
    function shareLink() {
      // 保留当前部署目录，兼容 localhost、GitHub Pages 的 /repo/ 子路径和自定义域名。
      const url = new URL("index.html", location.href);
      url.search = ""; url.hash = ""; url.searchParams.set("play", "project");
      return url.toString();
    }
    function showPublishCard(ch, res) {
      const old = $("#edPublishCard"); if (old) old.remove();
      const errs = res.issues.filter(i => i.level === "error"), warns = res.issues.filter(i => i.level === "warn");
      const card = document.createElement("div"); card.id = "edPublishCard";
      const link = shareLink();
      card.innerHTML = res.ok ? `
        <div class="pub-head ok">✅ 发布检查通过 <small>${res.checks} 项校验全过${warns.length ? ` · ${warns.length} 条提醒` : ""}</small></div>
        <div class="pub-sub">读者打开下面的链接,不用安装、不用登录,从世界地图走进《07号调查员》。</div>
        <div class="pub-link-row">
          <input id="pubLink" type="text" readonly value="${link}">
          <button id="pubCopy">复制链接</button>
        </div>
        <div class="pub-note">🔗 这是<b>项目级只读试玩</b>链接——读者能逛世界、进场景、对话和看调查日志,但看不到编辑器。</div>
        ${warns.length ? `<div class="pub-warns">${warns.map(w => `<div>⚠️ ${w.msg}</div>`).join("")}</div>` : ""}
        <div class="pub-actions"><button id="pubPreview" class="pub-go">▶ 以读者身份预览</button><button id="pubClose2" class="pub-ghost">关闭</button></div>`
        : `
        <div class="pub-head err">⛔ 还不能发布 <small>${errs.length} 个问题要先修</small></div>
        <div class="pub-sub">这些问题会让读者卡住或看到坏场景,修完再发布:</div>
        <div class="pub-issues">${errs.map(e => `<div class="pi-err">✗ ${e.msg}</div>`).join("")}${warns.map(w => `<div class="pi-warn">⚠️ ${w.msg}（不拦,建议改）</div>`).join("")}</div>
        <div class="pub-actions"><button id="pubClose2" class="pub-ghost">知道了,去修改</button></div>`;
      $("#editor").appendChild(card);
      $("#pubClose2").onclick = () => card.remove();
      const cp = $("#pubCopy");
      if (cp) cp.onclick = () => {
        const inp = $("#pubLink"); inp.select();
        navigator.clipboard ? navigator.clipboard.writeText(inp.value).then(() => showEdToast("✓ 链接已复制,发给读者就能玩")) : document.execCommand("copy");
        showEdToast("✓ 链接已复制,发给读者就能玩");
      };
      const pv = $("#pubPreview");
      if (pv) pv.onclick = () => location.href = link;
    }

    // 左侧竖排工具栏(LDtk 范式:画笔 + 元素提示 + 状态)
    function renderEditorBar() {
      const side = $("#edSide");
      side.innerHTML = `
        <div class="es-label">画笔</div>
        <div class="es-tool" data-b="wall"><span class="es-ic">🧱</span><span class="es-tx">墙</span></div>
        <div class="es-tool" data-b="walk"><span class="es-ic">⬜</span><span class="es-tx">可走</span></div>
        <div class="es-divider"></div>
        <div class="es-label">元素</div>
        <div class="es-info"><b>🎭</b>NPC</div>
        <div class="es-info"><b>🚩</b>起点</div>
        <div class="es-info" style="font-size:8px;opacity:.7;">画板上直接拖</div>
        ${ED.room.walkable ? `<div class="es-divider"></div>
        <div class="es-label">语义层</div>
        <div class="es-tool" id="esStreets"><span class="es-ic">🛣</span><span class="es-tx">街道叠加</span></div>
        <div class="es-tool" id="esBake"><span class="es-ic">🧭</span><span class="es-tx">烘焙语义</span></div>
        <div class="es-tool" id="esCompile"><span class="es-ic">⚙</span><span class="es-tx">编译通行</span></div>
        <div class="es-info" style="font-size:8px;opacity:.65;">${ED.room.semantics ? "✓ 已有语义层" : "未烘焙"}</div>` : ""}
        <div class="es-divider"></div>
        <div class="es-label">全局</div>
        <div class="es-tool" id="esSizes"><span class="es-ic">📏</span><span class="es-tx">角色尺寸</span></div>
        <div class="es-divider"></div>
        <div class="es-info" style="color:${ED.dirty ? '#ffb060' : '#6fd3c4'};">${ED.dirty ? '● 未保存' : '✓ 已同步'}</div>
        <div class="es-info" style="font-size:8px;opacity:.6;">${ED.COLS}×${ED.ROWS} 格</div>`;
      side.querySelectorAll(".es-tool[data-b]").forEach(b => {
        b.classList.toggle("active", b.dataset.b === ED.brush);
        b.onclick = () => { ED.brush = b.dataset.b; renderEditorBar(); };
      });
      const szBtn = $("#esSizes"); if (szBtn) szBtn.onclick = openSizePanel;
      // M8 语义层工具(双镜:walkable=编译产物的平台入口)
      const stBtn = $("#esStreets");
      if (stBtn) {
        stBtn.classList.toggle("active", !!ED.showStreets);
        stBtn.onclick = () => {
          ED.showStreets = !ED.showStreets;
          if (ED.showStreets && !roadsMaskOf()) { showEdToast("本图没有街道语义(荒地/室内图正常没有)——可先「烘焙语义」试试", true); ED.showStreets = false; return; }
          renderEditorBar(); renderEditorGrid();
        };
      }
      const bkBtn = $("#esBake");
      if (bkBtn) bkBtn.onclick = async () => {
        if (ED.dirty) { showEdToast("先点 💾 保存,再烘焙(语义层以盘上数据为准)", true); return; }
        bkBtn.style.opacity = .5;
        try {
          // 街道识别在浏览器 canvas 做(server 没有 PIL),烘焙时一并带给 server 落盘
          const roads = ED.streetMask ? ED.streetMask.map(r => r.map(v => v ? "1" : "0").join("")) : null;
          const r = await (await fetch("/api/command", { method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ intent: "bake_semantics", chapterId: ED.ch.id, params: { roads } }) })).json();
          if (r.ok) { await hotReloadChapter(null); showEdToast(`🧭 语义层已烘焙:地形 ${r.groundOpen} 开格` + (r.hasRoads ? ` · 街道 ${r.roadCells} 格` : " · 无路网(正常)")); }
          else showEdToast("烘焙失败:" + r.error, true);
        } catch (e) { showEdToast("server 未响应:" + e.message, true); }
        bkBtn.style.opacity = 1;
      };
      const cpBtn = $("#esCompile");
      if (cpBtn) cpBtn.onclick = async () => {
        if (ED.dirty) { showEdToast("先点 💾 保存,再编译(避免覆盖手上的改动)", true); return; }
        cpBtn.style.opacity = .5;
        try {
          const r = await (await fetch("/api/command", { method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ intent: "compile_walkable", chapterId: ED.ch.id }) })).json();
          if (r.ok) { await hotReloadChapter(null); showEdToast(`⚙ 通行层已编译(语义+物件碰撞):${r.changedCells} 格被修正`); }
          else showEdToast(r.error, true);
        } catch (e) { showEdToast("server 未响应:" + e.message, true); }
        cpBtn.style.opacity = 1;
      };
    }
    // 街道语义来源:烘焙过的 semantics.roads 优先,否则用实时识别的 streetMask
    function roadsMaskOf() {
      const sem = ED.room.semantics;
      if (sem && sem.roads && sem.roads.length) return sem.roads.map(r => r.split("").map(c => c === "1" ? 1 : 0));
      return ED.streetMask || null;
    }

    // ===== 📏 角色尺寸工作台:全局设置主角+每个 NPC 的尺寸,带真实比例参照预览 =====
    // 设计依据(用户拍板):①逐图设置太麻烦→全局生效 ②每个角色可单独调+一键统一 ③必须有参照物——大小是相对的
    const SIZE_SCENES = {
      city_l0_terrain: { label: "临澜城(街道)", w: 1664, refs: ["city_obj_kiosk", "city_obj_charge_post"] },
      belt_l0_terrain: { label: "监测带(荒地)", w: 768, refs: ["belt_obj_station6"] },
      edge_l0_terrain: { label: "隔离栏段", w: 960, refs: ["edge_obj_sentry", "edge_obj_sign"] },
      graymist_localmap_clean: { label: "6号站内(室内)", w: 448, refs: ["prop_console_center"] },
    };
    function collectSizeRows() {
      const rows = [{ id: "__hero", name: "凤翎（主角）", tex: "fengling_front", dock: 0 }];
      const seen = new Set();
      (DATA.chapters || []).forEach(c => (c.npcs || []).forEach(n => {
        if (n.noSprite || seen.has(n.id)) return;
        seen.add(n.id);
        rows.push({ id: n.id, name: n.name, tex: NPC_TEX[n.id] || "qinwang_front", dock: n.dockSize || 0 });
      }));
      return rows;
    }
    function sizeOf(row, st) {
      if (row.id === "__hero") return st.actorSize || 48;
      return st.npcSizes[row.id] || row.dock || st.actorSize || 48;
    }
    function openSizePanel() {
      const st = JSON.parse(JSON.stringify(DATA.settings || {}));
      st.actorSize = st.actorSize || 48; st.npcSizes = st.npcSizes || {};
      const rows = collectSizeRows();
      const panel = $("#edSizes");
      panel.classList.remove("hide");
      panel.style.cssText = "position:fixed;inset:0;z-index:60;background:#05070bd8;display:flex;align-items:center;justify-content:center;";
      const sceneOpts = Object.entries(SIZE_SCENES).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join("");
      panel.innerHTML = `
        <div style="width:min(940px,94vw);max-height:88vh;overflow:auto;background:#0b1119;border:1px solid #6fd3c433;border-radius:14px;padding:18px 22px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <h3 style="margin:0;color:#e8edf4;font-size:15px;">📏 角色尺寸工作台 <small style="color:#6a7585;font-weight:400">全局生效 · 个别地图可在「章节设置」单独覆盖</small></h3>
            <button class="pp-close" id="szClose">×</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div>
              <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;">
                <label class="pp-label" style="margin:0;white-space:nowrap;">参照场景</label>
                <select id="szScene" style="flex:0 0 220px;">${sceneOpts}</select>
                <small style="color:#6a7585;">大小是相对的——拿你自己的地图和建筑当尺子（真实像素比例 2 倍放大，建筑门高 ≈28px）</small>
              </div>
              <div id="szStage" style="height:230px;border:1px solid #ffffff14;border-radius:10px;overflow-x:auto;overflow-y:hidden;image-rendering:pixelated;display:flex;align-items:flex-end;"></div>
            </div>
            <div>
              <div style="display:flex;gap:8px;align-items:center;background:#ffffff08;border-radius:8px;padding:8px 10px;margin-bottom:8px;">
                <span style="font-size:12px;color:#cfd6e0;white-space:nowrap;">一键统一</span>
                <select id="szAll" style="width:140px;"><option value="24">24px 小</option><option value="48" selected>48px 大</option><option value="96">96px 特大</option></select>
                <button id="szApplyAll" style="white-space:nowrap;">应用到全部</button>
                <span style="flex:1;"></span>
                <button id="szSave" class="pp-regen" style="margin:0;">💾 保存（所有地图生效）</button>
              </div>
              <div id="szRows" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));column-gap:18px;"></div>
            </div>
          </div>
        </div>`;
      const optsFor = (cur, isHero) => {
        const std = [16, 24, 48, 96];
        const vals = std.concat(std.includes(cur) || !cur ? [] : [cur]).sort((a, b) => a - b);
        const base = isHero ? "" : `<option value="0" ${cur === 0 ? "selected" : ""}>跟随主角档</option>`;
        return base + vals.map(x => `<option value="${x}" ${x === cur ? "selected" : ""}>${x}px${x === 96 ? " 特大" : x === 48 ? " 大" : x === 24 ? " 小" : ""}</option>`).join("");
      };
      const renderRows = () => {
        $("#szRows").innerHTML = rows.map(r => {
          const explicit = r.id === "__hero" ? st.actorSize : (st.npcSizes[r.id] || 0);
          const eff = sizeOf(r, st);
          return `<div style="display:flex;align-items:center;gap:9px;padding:6px 4px;border-bottom:1px solid #ffffff0c;">
            <img src="art/out/${r.tex}.png" style="image-rendering:pixelated;height:26px;width:26px;object-fit:contain;">
            <span style="flex:1;font-size:12px;color:#cfd6e0;">${r.name}${r.dock ? `<small style="color:#6a7585"> · 嵌槽默认 ${r.dock}px</small>` : ""}</span>
            <select data-sid="${r.id}" style="width:130px;">${optsFor(explicit, r.id === "__hero")}</select>
            <span style="font-size:10px;color:#6fd3c4;width:46px;text-align:right;">→ ${eff}px</span>
          </div>`;
        }).join("");
        $("#szRows").querySelectorAll("select[data-sid]").forEach(sel => {
          sel.onchange = ev => {
            const v = parseInt(ev.target.value) || 0;
            if (sel.dataset.sid === "__hero") st.actorSize = v || 48;
            else if (v) st.npcSizes[sel.dataset.sid] = v;
            else delete st.npcSizes[sel.dataset.sid];
            renderRows(); renderPreview();
          };
        });
      };
      const renderPreview = () => {
        const key = $("#szScene").value, sc = SIZE_SCENES[key], PRE = 2;
        const stage = $("#szStage");
        stage.style.background = `url(art/out/${key}.png) center bottom / ${sc.w * PRE}px auto`;
        stage.innerHTML = `<div style="display:flex;align-items:flex-end;gap:14px;padding:0 16px 12px;">
          ${sc.refs.map(r => `<img src="art/out/${r}.png" style="image-rendering:pixelated;" onload="this.style.width=(this.naturalWidth*${PRE})+'px'">`).join("")}
          ${rows.map(r => `<img src="art/out/${r.tex}.png" title="${r.name}" style="image-rendering:pixelated;height:${sizeOf(r, st) * PRE}px;width:${sizeOf(r, st) * PRE}px;object-fit:contain;object-position:bottom;">`).join("")}
        </div>`;
      };
      $("#szScene").onchange = renderPreview;
      $("#szApplyAll").onclick = () => {
        const v = parseInt($("#szAll").value);
        st.actorSize = v;
        rows.forEach(r => { if (r.id !== "__hero") st.npcSizes[r.id] = v; });
        renderRows(); renderPreview();
        showEdToast(`已把全部角色设为 ${v}px——记得点保存`);
      };
      $("#szClose").onclick = () => { panel.classList.add("hide"); panel.innerHTML = ""; };
      $("#szSave").onclick = async () => {
        const npcSizes = {};
        Object.entries(st.npcSizes).forEach(([k, v]) => { if (v) npcSizes[k] = v; });
        try {
          const res = await fetch("/api/save-chapter", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ settings: { actorSize: st.actorSize, npcSizes } })
          });
          const out = await res.json();
          if (out.ok) {
            DATA.settings = { actorSize: st.actorSize, npcSizes };
            showEdToast("✓ 角色尺寸已保存,所有地图生效");
            panel.classList.add("hide"); panel.innerHTML = "";
          } else showEdToast("保存失败:" + (out.error || res.status), true);
        } catch (e) { showEdToast("保存失败:" + e.message, true); }
      };
      renderRows(); renderPreview();
    }

    function renderEditorGrid() {
      const g = $("#edGrid"); g.innerHTML = "";
      const roads = ED.showStreets ? roadsMaskOf() : null; // M8 街道语义叠加(绿色)
      for (let y = 0; y < ED.ROWS; y++) for (let x = 0; x < ED.COLS; x++) {
        const c = document.createElement("div");
        c.className = "ed-cell " + (ED.grid[y][x] ? "wall" : "walk") + ((roads && roads[y] && roads[y][x]) ? " street" : "");
        c.dataset.x = x; c.dataset.y = y;
        g.appendChild(c);
      }
    }

    // 渲染可拖的 NPC + spawn 浮层
    function renderEditorPawns() {
      // 清掉旧 pawn
      [...document.querySelectorAll("#edStage > .ed-pawn")].forEach(el => el.remove());
      const stage = $("#edStage");
      // spawn 旗
      stage.appendChild(makePawn("spawn", ED.spawn[0], ED.spawn[1], "🚩 起点", null));
      // NPC 头像(noSprite 的也显示,只是用占位圆)
      ED.npcs.forEach(n => {
        stage.appendChild(makePawn("npc", n.pos[0], n.pos[1], n.name, n));
      });
    }

    function makePawn(type, gx, gy, label, npc) {
      const el = document.createElement("div");
      el.className = "ed-pawn " + type;
      el.style.left = ((gx + 0.5) * 100 / ED.COLS) + "%";
      el.style.top = ((gy + 0.5) * 100 / ED.ROWS) + "%";
      el.style.width = (100 / ED.COLS * 1.4) + "%";
      el.style.height = (100 / ED.ROWS * 1.4) + "%";
      el.dataset.type = type;
      el.dataset.id = npc ? npc.id : "spawn";
      const img = document.createElement("div");
      img.className = "ed-pawn-img" + (type === "spawn" ? " spawn" : "");
      if (type === "npc" && !npc.noSprite) {
        img.style.backgroundImage = `url(art/out/${npc.img}.png)`;
      } else if (type === "npc" && npc.noSprite) {
        img.style.background = "radial-gradient(circle, #6fd3c4 30%, transparent 65%)";
      }
      const tag = document.createElement("div");
      tag.className = "ed-pawn-label";
      tag.textContent = label;
      el.appendChild(img); el.appendChild(tag);
      el.onmousedown = e => { e.preventDefault(); e.stopPropagation(); dragStart(el, type, npc ? npc.id : "spawn", gx, gy); };
      return el;
    }

    function renderEditorFoot() {
      const f = $("#edFoot");
      const npcInfo = ED.npcs.map(n => `${n.name}<span class="ed-selected">@${n.pos[0]},${n.pos[1]}</span>`).join("　·　");
      f.innerHTML = `<span>当前章节单元:</span> ${npcInfo}　·　起点<span class="ed-selected">@${ED.spawn[0]},${ED.spawn[1]}</span>`;
    }

    // 刷格
    function paintCell(el) {
      if (!el || !el.dataset || el.dataset.x === undefined) return;
      const x = +el.dataset.x, y = +el.dataset.y;
      const newVal = ED.brush === "wall" ? 1 : 0;
      if (ED.grid[y][x] === newVal) return;
      ED.grid[y][x] = newVal;
      el.className = "ed-cell " + (newVal ? "wall" : "walk");
      markDirty();
    }

    // ===== 拖拽 NPC / spawn =====
    function dragStart(el, type, id, gx, gy) {
      ED.drag = { el, type, id, startGX: gx, startGY: gy, lastGX: gx, lastGY: gy };
      el.classList.add("dragging");
    }
    function dragMove(e) {
      if (!ED.drag || ED.drag.type === "prop") return; // prop 有自己的 propDragMove,全局处理器不插手(否则双重处理冲突)
      const stage = $("#edStage");
      const r = stage.getBoundingClientRect();
      const cellW = r.width / ED.COLS, cellH = r.height / ED.ROWS;
      let gx = Math.floor((e.clientX - r.left) / cellW);
      let gy = Math.floor((e.clientY - r.top) / cellH);
      gx = Math.max(0, Math.min(ED.COLS - 1, gx));
      gy = Math.max(0, Math.min(ED.ROWS - 1, gy));
      ED.drag.lastGX = gx; ED.drag.lastGY = gy;
      ED.drag.el.style.left = ((gx + 0.5) * 100 / ED.COLS) + "%";
      ED.drag.el.style.top = ((gy + 0.5) * 100 / ED.ROWS) + "%";
      // 高亮目标格
      [...document.querySelectorAll(".ed-cell.over-target")].forEach(c => c.classList.remove("over-target"));
      const cell = [...document.querySelectorAll(".ed-cell")].find(c => +c.dataset.x === gx && +c.dataset.y === gy);
      if (cell) cell.classList.add("over-target");
    }
    function finishDrag() {
      if (!ED || !ED.drag || ED.drag.type === "prop") return; // prop 由 propDragEnd 收尾,这里早退避免抢先 null 掉 ED.drag 害 propDragEnd 拿不到数据
      const { type, id, lastGX, lastGY, startGX, startGY, el } = ED.drag;
      el.classList.remove("dragging");
      [...document.querySelectorAll(".ed-cell.over-target")].forEach(c => c.classList.remove("over-target"));
      if (lastGX !== startGX || lastGY !== startGY) {
        if (type === "spawn") { ED.spawn = [lastGX, lastGY]; }
        else { const n = ED.npcs.find(x => x.id === id); if (n) n.pos = [lastGX, lastGY]; }
        markDirty();
        renderEditorFoot();
      }
      ED.drag = null;
    }

    function markDirty() {
      if (!ED.dirty) { ED.dirty = true; renderEditorBar(); }
    }

    // ===== 保存 / 试玩 / 退出 =====
    async function saveChapter() {
      // 防呆:区域图保存前验 出生点→每个大门 连通(刷墙堵门/把门拖进死区/困死出生点=现场演示事故)
      if ((ED.gates || []).length) {
        const [sx, sy] = ED.spawn;
        if (ED.grid[sy][sx] === 1) { showEdToast("出生点被刷成墙了——先把它改回可走再保存", true); return; }
        const seen = new Set([sx + "," + sy]); const q = [[sx, sy]];
        while (q.length) {
          const [x, y] = q.pop();
          for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
            const nx = x + dx, ny = y + dy;
            if (nx >= 0 && ny >= 0 && nx < ED.COLS && ny < ED.ROWS && ED.grid[ny][nx] === 0 && !seen.has(nx + "," + ny)) { seen.add(nx + "," + ny); q.push([nx, ny]); }
          }
        }
        const dead = ED.gates.filter(g => !seen.has(g.at[0] + "," + g.at[1]));
        if (dead.length) { showEdToast(`大门不可达:${dead.map(g => g.label).join(" / ")}——把门拖回可走区或刷开门口的墙`, true); return; }
      }
      const walkable = ED.grid.map(r => r.map(v => v ? "1" : "0").join(""));
      const patch = {
        walkable,
        spawn: ED.spawn,
        actorSize: ED.actorSize || 0, // 章节设置:角色尺寸(0=默认档)
        npcs: ED.npcs.map(n => ({
          id: n.id, pos: n.pos, behavior: n.behavior || "static", range: n.range || 0, waypoints: n.waypoints || [],
          dialogue: n.dialogue, dialogPages: n.dialogPages
        })), // M5 行为 + 创作者台词随保存落盘
        props: (ED.props || []).map(p => ({ ...p })), // 全键透传,server 端按 id merge(防新字段被静默丢)
        gates: (ED.gates || []).map(g => ({ ...g, at: [...g.at] })) // 大门(传送口)可拖可改名
      };
      try {
        const res = await fetch("/api/save-chapter", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chapterId: ED.ch.id, patch })
        });
        const data = await res.json();
        if (data.ok) {
          // 同步本地 ch.room / ch.props
          ED.ch.room.walkable = walkable;
          ED.ch.room.spawn = [...ED.spawn];
          ED.ch.npcs.forEach(n => {
            const updated = ED.npcs.find(x => x.id === n.id);
            if (updated) {
              n.pos = [...updated.pos];
              n.dialogue = JSON.parse(JSON.stringify(updated.dialogue));
              if (updated.dialogPages) n.dialogPages = JSON.parse(JSON.stringify(updated.dialogPages));
            }
          });
          ED.ch.props = patch.props;
          if (patch.gates && patch.gates.length) ED.ch.gates = patch.gates;
          ED.dirty = false;
          renderEditorBar();
          showEdToast(`已保存到 chapters.json · 应用 ${data.applied.join("/") || "无变更"}`);
        } else {
          showEdToast("保存失败:" + (data.error || "未知错误"), true);
        }
      } catch (e) {
        showEdToast("保存失败:server 未运行?(应跑 python3 server.py 而非 http.server)", true);
      }
    }

    function playRoom() {
      if (ED.dirty) {
        if (!confirm("有未保存的改动,要先保存再试玩吗?(取消则丢弃)")) return;
        saveChapter().then(() => { setTimeout(() => location.replace(`/index.html?room=${ED.ch.id}&_=${Date.now()}`), 600); });
        return;
      }
      location.replace(`/index.html?room=${ED.ch.id}&_=${Date.now()}`);
    }

    function exitEditor() {
      if (ED.dirty && !confirm("有未保存的改动,确认退出吗?")) return;
      location.replace(`/index.html?_=${Date.now()}`);
    }

    // ===== M7 AI 命令层(编辑器客户端):说人话 → /api/ai-command → 命令注册表执行 → 热更新画板 =====
    function toggleCmdBar() {
      const bar = $("#edCmd");
      bar.classList.toggle("hide");
      if (!bar.classList.contains("hide")) {
        $("#edCmdInput").focus();
        bar.querySelectorAll(".cmd-hint b").forEach(b => b.onclick = () => { $("#edCmdInput").value = b.dataset.c; $("#edCmdInput").focus(); });
        $("#edCmdRun").onclick = runAICommand;
        $("#edCmdInput").onkeydown = e => { if (e.key === "Enter") runAICommand(); e.stopPropagation(); };
      }
    }
    function logCmd(text, ok, engine) {
      const log = $("#edCmdLog");
      const d = document.createElement("div");
      d.className = "cl-item " + (ok ? "ok" : "err");
      d.innerHTML = `${ok ? "✓" : "✗"} ${text}${engine ? `<span class="cl-engine">${engine === "deepseek" ? "🤖 DeepSeek" : "📐 规则解析"}</span>` : ""}`;
      log.prepend(d);
    }
    async function runAICommand() {
      const input = $("#edCmdInput"), btn = $("#edCmdRun");
      const text = input.value.trim();
      if (!text) return;
      if (ED.dirty) { showEdToast("有未保存的手动改动——先点 💾 保存,再用 AI 命令(避免互相覆盖)", true); return; }
      btn.disabled = true; btn.textContent = "执行中…";
      try {
        const res = await fetch("/api/ai-command", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, chapterId: ED.ch.id })
        });
        const r = await res.json();
        if (r.ok) {
          const what = r.action === "move" ? `已把「${r.name}」挪到 ${r.pos}` :
            r.action === "clone" ? `已在 ${r.pos} 放置「${r.name}」(${r.propId})` :
            `已让「${r.name}」${({ static: "停下", wander: "游走", patrol: "巡逻" })[r.behavior] || r.behavior}`;
          logCmd(`${text} → ${what}`, true, r.engine);
          input.value = "";
          await hotReloadChapter(r.propId || null);
          showEdToast("⌘ " + what);
        } else {
          logCmd(`${text} → ${r.error || "执行失败"}`, false, r.engine);
        }
      } catch (e) {
        logCmd(`${text} → server 未响应(${e.message})`, false);
      }
      btn.disabled = false; btn.textContent = "执行";
    }
    // 热更新:重拉 chapters.json → 替换 DATA → 原地重建编辑器(选中 AI 刚动过的单元)
    async function hotReloadChapter(selectId) {
      const fresh = await (await fetch("chapters.json?_=" + Date.now())).json();
      DATA.chapters = fresh.chapters;
      if (fresh.settings) DATA.settings = fresh.settings;
      const chId = ED.ch.id;
      setupEditor(chId); // #edCmd 抽屉是 #editor 根级常驻 DOM,不会被重建——开着就还开着,日志也还在
      if (selectId && (ED.props || []).some(p => p.id === selectId)) {
        ED.selectedProp = selectId;
        renderInspector(); renderEditorProps();
      }
    }
    function showEdToast(msg, isError) {
      const t = $("#edToast");
      t.textContent = msg;
      t.className = isError ? "error" : "";
      setTimeout(() => t.classList.add("hide"), isError ? 4000 : 2200);
      t.classList.remove("hide");
    }

    // mock 对话生成器:根据 NPC + 语气 + 分支数 拼出"AI 风格"的对话节点
    function mockGenerateDialogue(npcId, tone, branches) {
      const npc = ED.npcs.find(n => n.id === npcId) || { name: "NPC" };
      const TONES = {
        cold: { opening: `(${npc.name === "灰域观察窗" ? "雾在玻璃外" : "待机灯亮起"})……你也是来读数的。我们,是同一批的型号。`,
                response: "被刮掉了。不是我刮的。\n醒来时就这样——我应该早已被注销。",
                inner: "(同型号、满电、日志空白。\n那只喂电的手,不在册。)" },
        warm: { opening: `啊,${npc.name === "灰域观察窗" ? "终于有人来这边了" : "你来了"}。我等了很久……和我聊聊吧。`,
                response: "你愿意听我说?谢谢你。\n这个世界,大多数时候没人听旧单元说话。",
                inner: "(它的声线比我记忆里柔。\n旧型号也会被这样温柔地放在这里。)" },
        curt: { opening: "型号。任务。",
                response: "编号。失。日志。空。",
                inner: "(它说话像我刚开机那年。短、准、不带情绪。)" },
        rebel: { opening: "又一个来盘问我的。先说,你站哪边。",
                response: "我懒得解释满电和日志空白的事。要查自己查。",
                inner: "(它在挑衅。但它的待机灯,亮得发抖。)" }
      };
      const t = TONES[tone] || TONES.cold;
      const nodes = [];
      if (branches >= 2) {
        const choices = [
          { label: "你的编号牌呢", goto: 1 },
          { label: "这个槽位不在巡检表上", goto: 2 }
        ];
        if (branches >= 3) choices.push({ label: "你怎么知道我的型号", goto: 1 });
        nodes.push({ speaker: npc.name, text: t.opening, choices });
        nodes.push({ speaker: npc.name, text: t.response, goto: 3 });
        nodes.push({ speaker: npc.name, text: "我也不在任何表上。可我在这里,满电。\n你说,是谁会给一台注销的单元充电。", goto: 3 });
        nodes.push({ speaker: "凤翎", text: t.inner, goto: "end" });
      } else {
        nodes.push({ speaker: npc.name, text: t.opening, goto: 1 });
        nodes.push({ speaker: npc.name, text: t.response, goto: 2 });
        nodes.push({ speaker: "凤翎", text: t.inner, goto: "end" });
      }
      return { start: 0, nodes };
    }

    function renderAIResult(dialogue, npcId) {
      const out = $("#edAIOut");
      const nodesHtml = dialogue.nodes.map((n, i) => {
        const isInner = (n.text || "").trim().startsWith("(") || (n.text || "").trim().startsWith("（");
        const choicesHtml = (n.choices || []).length
          ? `<div class="ai-choices">${n.choices.map(c => "▸ " + c.label).join("<br>")}</div>` : "";
        return `<div class="ai-node">
          <span class="ai-speaker">${n.speaker}</span>
          <span class="ai-text ${isInner ? 'inner' : ''}">${n.text.replace(/\n/g, "<br>")}</span>
          ${choicesHtml}</div>`;
      }).join("");
      out.innerHTML = `
        <div class="ai-result">
          <div class="ai-result-head"><span>✨ AI 生成 · ${dialogue.nodes.length} 个节点</span></div>
          ${nodesHtml}
          <div class="ai-actions">
            <button class="ai-regen" onclick="document.querySelector('#edAIGen').click()">🔄 再来一版</button>
            <button class="ai-apply" data-npc="${npcId}">✓ 应用到此 NPC</button>
          </div>
        </div>`;
      out.querySelector(".ai-apply").onclick = () => applyDialogue(npcId, dialogue);
    }

    async function applyDialogue(npcId, dialogue) {
      const patch = { npcs: [{ id: npcId, dialogue }] };
      try {
        const res = await fetch("/api/save-chapter", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chapterId: ED.ch.id, patch })
        });
        const data = await res.json();
        if (data.ok) {
          // 同步本地 ch.npcs[].dialogue
          const target = ED.ch.npcs.find(n => n.id === npcId);
          if (target) target.dialogue = dialogue;
          const editorNpc = ED.npcs.find(n => n.id === npcId);
          if (editorNpc) editorNpc.dialogue = JSON.parse(JSON.stringify(dialogue));
          showEdToast(`AI 对话已应用到 ${npcId} · 进入试玩即可看到效果`);
          $("#edAI").classList.add("hide");
        } else {
          showEdToast("应用失败:" + (data.error || "未知"), true);
        }
      } catch (e) {
        showEdToast("应用失败:server 未运行?", true);
      }
    }

    // ===== 3 步上手引导 =====
    function showOnboarding() {
      const steps = [
        { text: "左边选「🧱 墙 / ⬜ 可走」,在画板格子上点或拖,就能改地形", arrow: "left", target: ".es-tool[data-b=\"wall\"]", offset: [70, -16] },
        { text: "画板上按住就能拖 NPC / 物件;点一下任意单元,右边 Inspector 看属性、改设置", arrow: "top", target: "#edStage", offset: [40, 44] },
        { text: "改完按「💾 保存」写回 chapters.json,「▶ 试玩」立刻看效果", arrow: "top", target: "#edSave", offset: [-150, 46] }
      ];
      let i = 0;
      const tour = $("#edTour");
      function show() {
        if (i >= steps.length) { tour.classList.add("hide"); localStorage.setItem("fs01_editor_onboard", "1"); return; }
        const s = steps[i];
        const tgt = document.querySelector(s.target);
        if (!tgt) { i++; show(); return; }
        const r = tgt.getBoundingClientRect();
        tour.dataset.arrow = s.arrow;
        tour.innerHTML = `<div class="et-step">第 ${i + 1} 步 / 共 3 步</div><div>${s.text}</div>
          <div class="et-actions">
            <button class="skip" id="edTourSkip">跳过引导</button>
            <button id="edTourNext">${i === steps.length - 1 ? "开始创作" : "下一步 →"}</button>
          </div>`;
        tour.classList.remove("hide");
        tour.style.left = (r.left + s.offset[0]) + "px";
        tour.style.top = (r.bottom + s.offset[1]) + "px";
        // 视口夹紧:气泡不许溢出屏幕(高画板/长文案时会顶出底边——用户反馈)
        const tr = tour.getBoundingClientRect();
        if (tr.bottom > window.innerHeight - 10) tour.style.top = Math.max(10, window.innerHeight - tr.height - 10) + "px";
        if (tr.right > window.innerWidth - 10) tour.style.left = Math.max(10, window.innerWidth - tr.width - 10) + "px";
        $("#edTourNext").onclick = () => { i++; show(); };
        $("#edTourSkip").onclick = () => { i = 999; show(); };
      }
      show();
    }

      const mixc = (u, v, t) => [u[0] + (v[0] - u[0]) * t, u[1] + (v[1] - u[1]) * t, u[2] + (v[2] - u[2]) * t];
      const css = c => `rgb(${c[0] | 0},${c[1] | 0},${c[2] | 0})`;
      const LIGHT = ["#534AB7", "#7F77DD", "#1D9E75", "#5DCAA5", "#D4537E"].map(hex);
      const DEEP = ["#22D3EE", "#7C6FF0", "#E860C8", "#22D3EE", "#A78BFA"].map(hex);
      const BG_L = [[250, 249, 246], [250, 249, 246]], BG_D = [[13, 10, 42], [7, 5, 18]];
      // 采样标题文字像素当开场汇聚目标
      const oc = document.createElement("canvas"); oc.width = W; oc.height = H;
      const o = oc.getContext("2d");
      o.fillStyle = "#000";
      o.font = `500 ${Math.min(innerWidth * 0.082, 100) * DPR}px Georgia, "Songti SC", serif`;
      o.textBaseline = "middle";
      o.fillText("07号调查员", innerWidth * 0.09 * DPR, innerHeight * 0.45 * DPR);
      const idata = o.getImageData(0, 0, W, H).data, tgts = [], step = Math.max(3, Math.round(4 * DPR));
      for (let y = 0; y < H; y += step) for (let x = 0; x < W; x += step)
        if (idata[(y * W + x) * 4 + 3] > 100) tgts.push({ x, y });
      const LAYERS = [
        { n: 380, r: [0.4, 0.8], sp: 0.10, alpha: 0.30, par: 10 },
        { n: 300, r: [0.7, 1.4], sp: 0.20, alpha: 0.55, par: 26 },
        { n: 200, r: [1.3, 2.5], sp: 0.34, alpha: 0.82, par: 52 }];
      const ps = []; let ti = 0;
      LAYERS.forEach((L, li) => { for (let i = 0; i < L.n; i++) {
        const t = tgts.length ? tgts[ti++ % tgts.length] : { x: Math.random() * W, y: Math.random() * H };
        ps.push({ li, x: Math.random() * W, y: Math.random() * H, tx: t.x, ty: t.y,
          vx: (Math.random() - 0.5) * L.sp, vy: (Math.random() - 0.5) * L.sp,
          r: (L.r[0] + Math.random() * (L.r[1] - L.r[0])) * DPR, ci: (Math.random() * 5) | 0, ph: Math.random() * 6.28 }); } });
      H7 = { root, raf: 0, prog: 0, diving: false, mx: -9999, my: -9999, camX: 0, camY: 0, tgX: 0, tgY: 0, t0: performance.now(), grainT: 0 };
      const onMove = e => {
        H7.mx = e.clientX * DPR; H7.my = e.clientY * DPR;
        H7.tgX = e.clientX / innerWidth - 0.5; H7.tgY = e.clientY / innerHeight - 0.5;
        $("#h7Par").style.transform = `translate(${-H7.tgX * 14}px, ${-H7.tgY * 10}px)`;
      };
      addEventListener("mousemove", onMove); addEventListener("resize", resize);
      H7.cleanup = () => { removeEventListener("mousemove", onMove); removeEventListener("resize", resize); clearInterval(H7.grainT); };
      const gc = $("#h7grain"), g2 = gc.getContext("2d");
      const grain = () => {
        gc.width = innerWidth / 2; gc.height = innerHeight / 2;
        const img = g2.createImageData(gc.width, gc.height);
        for (let i = 0; i < img.data.length; i += 4) { const v = Math.random() * 255; img.data[i] = img.data[i + 1] = img.data[i + 2] = v; img.data[i + 3] = 28; }
        g2.putImageData(img, 0, 0);
      };
      grain(); H7.grainT = setInterval(grain, 180);
      const frame = now => {
        if (!H7) return;
        const t = (now - H7.t0) / 1000;
        if (H7.diving) H7.prog = Math.min(1, H7.prog + 0.016);
        H7.camX += (H7.tgX - H7.camX) * 0.06; H7.camY += (H7.tgY - H7.camY) * 0.06;
        const g = ctx.createLinearGradient(0, 0, W, H);
        g.addColorStop(0, css(mixc(BG_L[0], BG_D[0], H7.prog))); g.addColorStop(1, css(mixc(BG_L[1], BG_D[1], H7.prog)));
        ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
        const phase = t < 1.2 ? 0 : t < 2.4 ? 1 : 2;
        for (const p of ps) {
          const L = LAYERS[p.li];
          if (phase === 0 && !H7.diving) { p.x += (p.tx - p.x) * 0.085; p.y += (p.ty - p.y) * 0.085; }
          else if (phase === 1 && !H7.diving) {
            p.x += (p.tx - p.x) * 0.06 + Math.sin(p.ph + t * 3) * 0.3;
            p.y += (p.ty - p.y) * 0.06 + Math.cos(p.ph + t * 3) * 0.3;
          } else {
            p.x += p.vx * DPR * (1 + H7.prog * 2.5); p.y += p.vy * DPR * (1 + H7.prog * 2.5);
            if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
            if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
            if (p.li === 2 && H7.mx > -100) {
              const dx = H7.mx - p.x, dy = H7.my - p.y, d = Math.hypot(dx, dy), R = 120 * DPR;
              if (d < R && d > 0.1) { const f = (R - d) / R * 2.6; p.x -= dx / d * f; p.y -= dy / d * f; }
            }
          }
          const ox = -H7.camX * L.par * DPR, oy = -H7.camY * L.par * DPR;
          const a = L.alpha * (0.65 + 0.35 * Math.sin(p.ph + t * 1.1));

          ctx.fillStyle = css(mixc(LIGHT[p.ci], DEEP[p.ci], H7.prog));
          ctx.beginPath(); ctx.arc(p.x + ox, p.y + oy, p.r * (1 + H7.prog * 0.25), 0, 6.28); ctx.fill();
        }
        ctx.globalAlpha = 1;
        H7.raf = requestAnimationFrame(frame);
      };
      H7.raf = requestAnimationFrame(frame);
      $("#h7Enter").onclick = () => {
        if (H7.diving) return;

        setTimeout(() => { root.classList.add("fading"); showWorldMapView(); }, 1500);
        setTimeout(() => closeHero07(), 2250);
      };
      $("#h7Platform").onclick = () => { root.classList.add("fading"); setTimeout(() => closeHero07(), 750); };
    }

    // ===== 工具 =====
    function buildRoom(room) {
      // 画像底图模式：碰撞直接来自 walkable 网格（"1"=墙/障碍，"0"=可走），与底图 1:1 对齐
      if (room.walkable) return room.walkable.map(row => row.split("").map(c => (c === "1" ? 1 : 0)));
      const { cols, rows, innerWalls = [] } = room;
      const m = [];
      for (let y = 0; y < rows; y++) { const r = []; for (let x = 0; x < cols; x++)
        r.push((x === 0 || y === 0 || x === cols - 1 || y === rows - 1) ? 1 : 0); m.push(r); }
      innerWalls.forEach(([x, y]) => { if (m[y] && m[y][x] !== undefined) m[y][x] = 1; });
      return m;
    }
    function makeHero(scene, x, y, size) {
      size = size || 40;
      const shadow = scene.add.ellipse(0, size * 0.40, size * 0.5, size * 0.16, 0x000000, 0.35);
      const spr = scene.add.image(0, 0, "fengling_front").setDisplaySize(size, size).setOrigin(0.5, 0.62);
      const cont = scene.add.container(x, y, [shadow, spr]);
      cont.__spr = spr;
      return cont;
    }
    function setHeroDir(cont, dir) {
      const tex = { up: "fengling_back", down: "fengling_front", left: "fengling_left", right: "fengling_right" }[dir];
      if (tex && cont && cont.__spr) cont.__spr.setTexture(tex);
    }

    function makeNPC(scene, x, y, npcData, size) {
      size = size || 40;
      const parts = [];
      if (npcData.noSprite) {
        // 底图已画此物件（如观察窗）→ 不叠 sprite，只标可交互高亮（脉动青绿环），避免与底图重复穿模
        const ring = scene.add.circle(0, 0, size * 0.5, 0x6fd3c4, 0).setStrokeStyle(1.5, 0x6fd3c4, 0.9);

      scene.tweens.add({ targets: mark, y: -size * 0.6 - 4, duration: 600, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });

    // ===== Room：区域内可走房间 =====
    class RoomScene extends Phaser.Scene {
      constructor() { super("room"); }
      init(data) { this.chapterId = data.chapterId; this.spawnAt = data.spawnAt || null; }
      preload() {
        const ch = DATA.chapters.find(c => c.id === this.chapterId);
        if (!ch) return;
        const room = ch.room || {};
        const loadImage = n => { if (n && !this.textures.exists(n)) this.load.image(n, "art/out/" + n + ".png?_=" + Date.now()); };
        ["fengling_front", "fengling_back", "fengling_left", "fengling_right"].forEach(loadImage);
        (ch.npcs || []).forEach(n => { if (!n.noSprite) loadImage(NPC_TEX[n.id] || "qinwang_front"); });
        if (room.bgImage) loadImage(room.bgImage);
        (room.effects || []).forEach(e => loadImage(e.sprite));
        (ch.props || []).forEach(p => loadImage(p.sprite));
        if (!room.bgImage) {
          if (!this.textures.exists("floor_quarantine")) this.load.spritesheet("floor_quarantine", "art/out/quarantine_floor_tileset.png?_=" + Date.now(), { frameWidth: 16, frameHeight: 16 });
          if (!this.textures.exists("floor_facility")) this.load.spritesheet("floor_facility", "art/out/facility_floor_tileset.png?_=" + Date.now(), { frameWidth: 16, frameHeight: 16 });
        }
      }
      create() {
        const ch = DATA.chapters.find(c => c.id === this.chapterId); this.ch = ch;
        const room = ch.room;
        this.TILE = 16; this.COLS = room.cols; this.ROWS = room.rows;
        // 大地图(区域图)模式:地图超出视口 → 镜头跟随调查员(始终居中);小房间仍整屏居中
        const mapW = this.COLS * this.TILE, mapH = this.ROWS * this.TILE;
        this.bigMap = mapW > DATA.world.w || mapH > DATA.world.h;
        this.offX = this.bigMap ? 0 : Math.floor((DATA.world.w - mapW) / 2);
        this.offY = this.bigMap ? 0 : Math.floor((DATA.world.h - mapH) / 2);
        // 防上一场景残留:每次 create 都重置相机(从大地图回小房间时必须停跟随)
        this.cameras.main.stopFollow();
        this.cameras.main.setScroll(0, 0);
        this.cameras.main.setBounds(0, 0, Math.max(mapW, DATA.world.w), Math.max(mapH, DATA.world.h));
        // 超大地图(如临澜城 1664×928)用 zoom1:画布 960×540 直显世界像素,镜头视野和观感分辨率都翻倍;
        // 其余场景 zoom2:有效视口仍是 480×270 世界单位,和升档前观感逐像素一致(用户反馈"分辨率能否再高一些")
        this.lowZoom = mapW > 960 && mapH > 540;
        this.cameras.main.setZoom(this.lowZoom ? 1 : 2);
        if (!this.bigMap) this.cameras.main.centerOn(DATA.world.w / 2, DATA.world.h / 2);
        this.MAP = buildRoom(room);
        // 从设施返回区域时落在来时大门旁,而不是默认出生点(否则像被随机传送——审查 P1)
        let sp = room.spawn;
        if (this.spawnAt) {
          const [gx0, gy0] = this.spawnAt;
          const cand = [[gx0, gy0 + 1], [gx0, gy0 - 1], [gx0 + 1, gy0], [gx0 - 1, gy0]]
            .find(([x, y]) => x >= 0 && y >= 0 && x < room.cols && y < room.rows && this.MAP[y] && this.MAP[y][x] === 0);
          sp = cand || this.spawnAt; // 门旁无空位就落门格本身(站上不触发,走开再回来才触发)
        }
        this.gx = sp[0]; this.gy = sp[1]; this.moving = false;
        this.DIRS = { left: [-1, 0], right: [1, 0], up: [0, -1], down: [0, 1] };

        const off = (x, y) => [this.offX + x * this.TILE, this.offY + y * this.TILE];
        if (room.bgImage) {
          // 画像底图模式：clean 环境底图铺满房间（448×240 = 28×15格×16px，1:1 对齐）
          this.add.image(this.offX, this.offY, room.bgImage).setOrigin(0, 0).setDisplaySize(this.COLS * this.TILE, this.ROWS * this.TILE);
          // 独立物件(拆件)：movable 与 fixed sprite 都渲染；movable 只影响编辑器拖拽权限。
          this.propSprites = [];
          (ch.props || []).filter(p => p.sprite).forEach(p => {
            const img = this.add.image(this.offX + p.pos[0] * this.TILE, this.offY + p.pos[1] * this.TILE, p.sprite)
              .setOrigin(0, 0).setDisplaySize(p.size[0] * this.TILE, p.size[1] * this.TILE);
            // Y-sort: 深度锚=物件底边(基线)。角色脚底越过底边才显在物件前;footprint 只管碰撞不管深度
            // (锚用碰撞线顶边是踩过的坑:主角站楼后第一行 feet 会超过碰撞线→错误画在楼前)
            const sortY = this.offY + (p.pos[1] + p.size[1]) * this.TILE;
            img.setDepth(sortY);
            this.propSprites.push({ id: p.id, img });
          });
        } else {
          const floorKey = (room.floor === "quarantine") ? "floor_quarantine" : "floor_facility";
          const FLOOR_FRAMES = [0, 7, 9, 15]; // 选素净金属板，避开带橙警示条(2/4/11/13)和格栅(1/3)的帧
          // 先铺地面 tile（精美 tileset）
          for (let y = 0; y < this.ROWS; y++) for (let x = 0; x < this.COLS; x++) {
            if (this.MAP[y][x] !== 0) continue;
            const [px, py] = off(x, y);
            const fr = FLOOR_FRAMES[(x * 3 + y * 7) % FLOOR_FRAMES.length];
            this.add.image(px, py, floorKey, fr).setOrigin(0, 0).setDisplaySize(this.TILE, this.TILE);
          }
          // 再画墙（盖在地面之上，做出凸起立体感，拉开与地面的对比）
          const g = this.add.graphics();
          for (let y = 0; y < this.ROWS; y++) for (let x = 0; x < this.COLS; x++) {
            if (this.MAP[y][x] !== 1) continue;
            const [px, py] = off(x, y);
            g.fillStyle(0x05070b, 1); g.fillRect(px, py, this.TILE, this.TILE);             // 暗底
            g.fillStyle(C.wall, 1); g.fillRect(px + 1, py, this.TILE - 1, this.TILE - 2);   // 墙面
            g.fillStyle(C.wallTop, 1); g.fillRect(px + 1, py, this.TILE - 1, 2);            // 顶部高光
            g.fillStyle(0x05070b, 1); g.fillRect(px, py + this.TILE - 2, this.TILE, 2);     // 底部阴影
          }
          g.lineStyle(1, 0xffffff, 0.04);
          for (let x = 0; x <= this.COLS; x++) { const [px] = off(x, 0); g.beginPath(); g.moveTo(px, this.offY); g.lineTo(px, this.offY + this.ROWS * this.TILE); g.strokePath(); }
          for (let y = 0; y <= this.ROWS; y++) { const [, py] = off(0, y); g.beginPath(); g.moveTo(this.offX, py); g.lineTo(this.offX + this.COLS * this.TILE, py); g.strokePath(); }
        }

        const [hx, hy] = this.tileCenter(this.gx, this.gy);
        // 角色尺寸三级解析:本图覆盖(章节设置) > 全局设置(角色尺寸工作台) > 引擎默认。档位整除 48 防立绘碎裂
        const GS = DATA.settings || {};
        const actorSize = room.actorSize || GS.actorSize || (room.bgImage ? 24 : 48);
        this.actorSize = actorSize; // update() 里 y-sort 用
        this.hero = makeHero(this, hx, hy, actorSize);
        if (this.bigMap) {
          // 区域大地图:每帧硬锁镜头中心=调查员(用户规格:始终居中;贴图边时由 bounds 夹紧)
          // 不用 startFollow——其 lerp 跟随在本场景实测 X 轴会卡死,centerOn 每帧钉死最可靠
          this.cameras.main.setRoundPixels(true);
          this.cameras.main.centerOn(this.hero.x, this.hero.y);
        }
        // 大门:走上门格 → 进入对应设施(章节);可进=青绿脉动,锁定=灰色🔒不脉动(审查 P2:锁态要看得出来)
        this.gates = (ch.gates || []).map(g => {
          const target = DATA.chapters.find(c => c.id === g.to);
          const open = target && chapterUnlocked(target);
          const [px, py] = this.tileCenter(g.at[0], g.at[1]);
          const ring = this.add.graphics().setDepth(5000); // y-sort: 大门始终置顶(高于角色层)
          ring.lineStyle(1.5, open ? 0x6fd3c4 : 0x5a6577, open ? 0.9 : 0.6);
          ring.strokeRect(px - this.TILE / 2 - 1, py - this.TILE / 2 - 1, this.TILE + 2, this.TILE + 2);
          if (open) this.tweens.add({ targets: ring, alpha: 0.25, duration: 900, yoyo: true, repeat: -1 });
          const tag = this.add.text(px, py - this.TILE - 2, (open ? "▶ " : "🔒 ") + g.label, { fontFamily: '"Courier New",monospace', fontSize: this.lowZoom ? "12px" : "8px", color: open ? "#6fd3c4" : "#5a6577", backgroundColor: "#06080cd0", padding: { x: 3, y: 2 }, resolution: 3 }).setOrigin(0.5, 1).setDepth(5001);
          return { ...g, ring, tag };
        });
        // tile 模式(无底图)房间:异常层来自数据,只做小面积叠加,不参与碰撞。
        if (!room.bgImage) (room.effects || []).forEach(e => {
          const x = this.offX + e.pos[0] * this.TILE, y = this.offY + e.pos[1] * this.TILE;
          const w = (e.size ? e.size[0] : 1) * this.TILE, h = (e.size ? e.size[1] : 1) * this.TILE;
          this.add.image(x, y, e.sprite).setOrigin(0, 0).setDisplaySize(w, h).setAlpha(e.alpha == null ? 1 : e.alpha);
        });
        // tile 模式(无底图)房间:有 sprite 的物件显示真实像素素材,其余保留线框。
        if (!room.bgImage) (ch.props || []).forEach(p => {
          const x = this.offX + p.pos[0] * this.TILE, y = this.offY + p.pos[1] * this.TILE;
          const w = p.size[0] * this.TILE, h = p.size[1] * this.TILE;
          // Y-sort: 与底图模式 propSprites 同一套公式——深度锚=物件底边,footprint 只管碰撞
          const sortY = y + h;
          const pg = this.add.graphics().setDepth(sortY);
          if (p.sprite) {
            const img = this.add.image(x, y, p.sprite).setOrigin(0, 0).setDisplaySize(w, h).setDepth(sortY);
            (this.propSprites = this.propSprites || []).push({ id: p.id, img }); // 纳入遮挡渐隐池
            pg.lineStyle(1, p.isInteractable ? 0x6fd3c4 : 0x5a6577, p.isInteractable ? 0.45 : 0.25);
            pg.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
          } else {
            pg.fillStyle(0x6fd3c4, 0.06); pg.fillRect(x, y, w, h);
            pg.lineStyle(1, 0x6fd3c4, 0.55); pg.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
          }
          if (p.isInteractable) this.add.text(x + w / 2, y - 2, p.name, { fontFamily: '"Courier New",monospace', fontSize: "7px", color: "#6fd3c4", backgroundColor: "#06080cb0", padding: { x: 2, y: 1 }, resolution: 3 }).setOrigin(0.5, 1).setDepth(sortY + 1);
        });

        // NPC（数据驱动：每篇的 npcs）
        this.npcs = (ch.npcs || []).map(n => {
          const [px, py] = this.tileCenter(n.pos[0], n.pos[1]);
          // 底图模式下,嵌进底图凹槽里的单元(如 SE-12 在休眠槽)再缩一档,避免 sprite 溢出槽位
          // NPC 尺寸:全局单体设置 > 嵌槽 dockSize(底图槽位贴合) > 跟随主角档
          const npcSize = ((DATA.settings || {}).npcSizes || {})[n.id] || ((room.bgImage && n.dockSize) ? n.dockSize : actorSize);
          const obj = makeNPC(this, px, py, n, npcSize);
          obj.setDepth(py + npcSize * 0.38); // y-sort: NPC 按脚底排深度(移动时 npcStep 同步更新)
          return { data: n, gx: n.pos[0], gy: n.pos[1], size: npcSize, obj, waitTicks: 0, wpIdx: null };
        });
        // M5 NPC 行为驱动:wander/patrol 用 setInterval(不靠 Phaser 时钟——headless 虚拟时间下也能推进,RAF 冻结不影响数据层)
        if (this.npcTimer) clearInterval(this.npcTimer);
        if (this.npcs.some(n => n.data.behavior && n.data.behavior !== "static")) {
          this.npcTimer = setInterval(() => this.npcTick(), 420);
          this.events.once("shutdown", () => clearInterval(this.npcTimer));
        }
        // M5 触发器:enter/leave/auto;inside 初始化为"出生即在区内"防开局误触 enter
        markVisited(ch.id);
        this.triggers = (ch.triggers || []).map(t => {
          const w = (t.area && t.area[0]) || 1, h = (t.area && t.area[1]) || 1;
          const inside = this.gx >= t.at[0] && this.gx < t.at[0] + w && this.gy >= t.at[1] && this.gy < t.at[1] + h;
          return { ...t, inside };
        });
        this.actQueue = null; this.actionDialog = false;
        setTimeout(() => this.checkTriggers("auto"), 400);
        this.nearNPC = null; this.dialogActive = false; this.curDialog = null; this.curNode = null;
        // 可交互物件:记下 footprint(走近任意占格即可触发),走近按空格弹 interactText
        this.iprops = (ch.props || []).filter(p => p.isInteractable).map(p => ({
          id: p.id, name: p.name, interactText: p.interactText || "",
          requiresItem: p.requiresItem || null, lockedHint: p.lockedHint || "",   // M6 钥匙门
          givesItemId: p.givesItemId || null, givesItemName: p.givesItemName || "", // M6 给道具
          actions: p.actions || null, // M6 物件可挂指令序列(解锁后走解释器)
          x0: p.pos[0], y0: p.pos[1], x1: p.pos[0] + p.size[0] - 1, y1: p.pos[1] + p.size[1] - 1
        }));
        this.nearProp = null;

        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys({ up: "W", down: "S", left: "A", right: "D" });
        this.keyTalk = this.input.keyboard.addKeys({ space: "SPACE", enter: "ENTER" });
        this.tapPath = []; this.tapAction = null; this.tapTimer = null; this.tapMarker = null;
        this.input.on("pointerdown", this.handleTapMove, this);
        const interactBtn = document.querySelector("#interact");
        interactBtn.onclick = ev => {
          ev.preventDefault(); ev.stopPropagation();
          if (this.dialogActive) return;
          if (this.nearNPC) this.startDialog(this.nearNPC);
          else if (this.nearProp) this.interactProp(this.nearProp);
        };
        this.events.once("shutdown", () => {
          this.cancelTapMove();
          this.input.off("pointerdown", this.handleTapMove, this);
          if (interactBtn) interactBtn.onclick = null;
        });

        showRoomUI(ch);
        this.updateNearNPC();

        // 外部/调试钩子
        window.__heroPos = () => ({ gx: this.gx, gy: this.gy });
        window.__curScene = () => "room:" + this.chapterId;
        window.__demoMove = (dir) => this.tryMove(dir);
        window.__simWalk = (dir, max = 40) => {
          const d = this.DIRS[dir]; if (!d) return null;
          let x = this.gx, y = this.gy;
          for (let i = 0; i < max; i++) { const nx = x + d[0], ny = y + d[1];
            if (!this.canWalk(nx, ny)) return { from: [this.gx, this.gy], stoppedAt: [x, y], hitWall: [nx, ny], steps: i };
            x = nx; y = ny; }
          return { from: [this.gx, this.gy], stoppedAt: [x, y], hitWall: null, steps: max };
        };
        window.__npcs = () => (this.npcs || []).map(n => ({ name: n.data.name, pos: [n.gx, n.gy] }));
        window.__near = () => this.nearNPC ? this.nearNPC.data.name : null;
        window.__talk = () => { if (this.nearNPC) { this.startDialog(this.nearNPC); return true; } return false; };
        window.__tapMove = (x, y) => this.beginTapMove(x, y);
        window.__dialogState = () => this.dialogActive ? { speaker: document.querySelector("#dlgSpeaker").textContent, text: document.querySelector("#dlgText").textContent, choices: [...document.querySelectorAll("#dlgChoices button")].map(b => b.textContent) } : null;
        window.__click = (i) => { const bs = document.querySelectorAll("#dlgChoices button"); if (bs[i]) { bs[i].click(); return true; } return false; };
        window.__teleport = (x, y) => { this.gx = x; this.gy = y; const [px, py] = this.tileCenter(x, y); this.hero.x = px; this.hero.y = py; this.updateNearNPC(); return { pos: [this.gx, this.gy], near: this.nearNPC ? this.nearNPC.data.name : null }; };
        // 视觉取证:?tp=x,y 开局传送(headless --screenshot 出证据图用;无视碰撞,纯摆拍)
        const tpq = new URLSearchParams(location.search).get("tp");
        if (tpq) { const [tx, ty] = tpq.split(",").map(Number);
          if (Number.isFinite(tx) && Number.isFinite(ty)) { window.__teleport(tx, ty);
            this.hero.setDepth(this.hero.y + this.actorSize * 0.38); // headless RAF 可能冻结,同步补 y-sort depth
            this.applyOcclusionFade(); // 同步补渐隐(headless 截图取证用)
            if (this.bigMap) this.cameras.main.centerOn(this.hero.x, this.hero.y);
          } }
        window.__iprops = () => (this.iprops || []).map(p => p.id);
        window.__propSprites = () => (this.propSprites || []).map(p => p.id || p);
        window.__gates = () => (this.gates || []).map(g => g.to);
        // E2E:?tapto=x,y 走真实点击寻路队列并报告落点。
        const tapto = new URLSearchParams(location.search).get("tapto");
        if (tapto) {
          const [tx, ty] = tapto.split(",").map(Number);
          let started = false;
          // create() 尚未退出时 ScenePlugin 还未标 active；模拟真实用户在画面就绪后点击。
          setTimeout(() => { started = Number.isFinite(tx) && Number.isFinite(ty) && this.beginTapMove(tx, ty); }, 520);
          setTimeout(() => {
            const arrived = this.gx === tx && this.gy === ty;
            const res = `TAPMOVE target=${tx},${ty} now=${this.gx},${this.gy} started=${!!started} ${arrived ? "PASS" : "FAIL"}`;
            document.title = res;
            const d = document.createElement("div"); d.id = "tapMoveOut"; d.textContent = res;
            d.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(d);
          }, 3000);
        }
        // E2E:?simgate=chX 传送到大门旁→走上门格→断言切到目标设施场景
        const simgate = new URLSearchParams(location.search).get("simgate");
        if (simgate && (this.gates || []).some(g => g.to === simgate) && !window.__simgateDone) {
          window.__simgateDone = true; // 只在区域场景触发一次,防目标场景重复执行
          const g = this.gates.find(g => g.to === simgate);
          setTimeout(() => {
            // 找门格旁的可走格,传送过去,然后朝门走一步(走真实 tryMove 链路)
            const dirs = [[0, 1, "up"], [0, -1, "down"], [1, 0, "left"], [-1, 0, "right"]];
            for (const [dx, dy, dir] of dirs) {
              const ax = g.at[0] + dx, ay = g.at[1] + dy;
              if (this.canWalk(ax, ay)) {
                this.gx = ax; this.gy = ay;
                const [px, py] = this.tileCenter(ax, ay); this.hero.x = px; this.hero.y = py;
                this.tryMove(dir);
                break;
              }
            }
            setTimeout(() => {
              const cur = (typeof window.__curScene === "function") ? window.__curScene() : "";
              const res = `SIMGATE target=${simgate} cur=${cur} ${cur === "room:" + simgate ? "PASS" : "FAIL"}`;
              document.title = res;
              const d = document.createElement("div"); d.id = "simGateOut"; d.textContent = res;
              d.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(d);
            }, 700);
          }, 500);
        }
        // E2E:?camprobe=1 大地图传送到远角,断言相机真的滚动了(镜头跟随生效)
        if (new URLSearchParams(location.search).get("camprobe") === "1" && this.bigMap) {
          // 找右下象限一个可走格传送
          let tgt = null;
          for (let y = this.ROWS - 2; y > this.ROWS / 2 && !tgt; y--)
            for (let x = this.COLS - 2; x > this.COLS / 2 && !tgt; x--)
              if (this.canWalk(x, y)) tgt = [x, y];
          if (tgt) { this.gx = tgt[0]; this.gy = tgt[1]; const [px, py] = this.tileCenter(tgt[0], tgt[1]); this.hero.x = px; this.hero.y = py; }
          this.cameras.main.centerOn(this.hero.x, this.hero.y); // 同步钉一次,不等帧循环
          const cam = this.cameras.main;
          const sx = cam.scrollX, sy = cam.scrollY;
          const b = cam.getBounds();
          const res = `CAMPROBE big=${this.bigMap} scroll=${Math.round(sx)},${Math.round(sy)} hero=${this.gx},${this.gy}@${Math.round(this.hero.x)},${Math.round(this.hero.y)} bounds=${b.width}x${b.height} cam=${cam.width}x${cam.height} ${(sx > 10 || sy > 10) ? "PASS" : "FAIL"}`;
          document.title = res;
          const d = document.createElement("div"); d.id = "camOut"; d.textContent = res;
          d.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(d);
        }
        // E2E:?propsprobe=a,b 断言 bgImage 模式下指定 sprite prop 已进入渲染列表。
        const propsprobe = new URLSearchParams(location.search).get("propsprobe");
        if (propsprobe) {
          const want = propsprobe.split(",").map(s => s.trim()).filter(Boolean);
          const have = (this.propSprites || []).map(p => p.id || p);
          const missing = want.filter(id => !have.includes(id));
          const res = `PROPSPROBE want=${want.join(",")} have=${have.join(",")} ${missing.length ? "FAIL missing=" + missing.join(",") : "PASS"}`;
          document.title = res;
          const d = document.createElement("div"); d.id = "propsProbeOut"; d.textContent = res;
          d.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(d);
        }
        // E2E:?room=chX&simact=propId 自动触发可交互物件,把对话状态写进 DOM 供冒烟测试断言
        // E2E:?npcprobe=npcId 等虚拟时间推进后断言 wander/patrol NPC 真的离开了出生格(数据层,不依赖渲染)
        const npcprobe = new URLSearchParams(location.search).get("npcprobe");
        if (npcprobe) {
          const n0 = (this.npcs || []).find(x => x.data.id === npcprobe);
          const start = n0 ? [n0.gx, n0.gy] : null;
          setTimeout(() => {
            const n1 = (this.npcs || []).find(x => x.data.id === npcprobe);
            const moved = n1 && start && (n1.gx !== start[0] || n1.gy !== start[1]);
            const res = `NPCPROBE ${npcprobe} behavior=${n1 ? n1.data.behavior : "?"} start=${start} now=${n1 ? [n1.gx, n1.gy] : "?"} ${moved ? "PASS" : "FAIL"}`;
            document.title = res;
            const dd = document.createElement("div"); dd.id = "npcProbeOut"; dd.textContent = res;
            dd.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(dd);
          }, 4200);
        }
        // E2E:?simtrig=trigId 把主角传到触发区旁→真实走一步进区→断言对话框弹出(enter)或加载后自动弹(auto)
        const simtrig = new URLSearchParams(location.search).get("simtrig");
        if (simtrig) {
          const t = (this.triggers || []).find(x => x.id === simtrig);
          const report = (ok, extra) => {
            const res = `SIMTRIG ${simtrig} ${extra || ""} ${ok ? "PASS" : "FAIL"}`;
            document.title = res;
            const dd = document.createElement("div"); dd.id = "simTrigOut"; dd.textContent = res;
            dd.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(dd);
          };
          if (!t) report(false, "NOTRIG");
          else if (t.type === "auto") {
            setTimeout(() => {
              const dlg = document.querySelector("#dialog");
              const txt = (document.querySelector("#dlgText") || {}).textContent || "";
              report(dlg && !dlg.classList.contains("hide") && txt.trim(), `auto text="${txt.slice(0, 16)}"`);
            }, 900);
          } else {
            setTimeout(() => {
              // 找区外紧邻格→传送→tryMove 走进区(真实链路)
              const w = (t.area && t.area[0]) || 1, h = (t.area && t.area[1]) || 1;
              const edges = [];
              for (let x = t.at[0]; x < t.at[0] + w; x++) { edges.push([x, t.at[1] - 1, "down"]); edges.push([x, t.at[1] + h, "up"]); }
              for (let y = t.at[1]; y < t.at[1] + h; y++) { edges.push([t.at[0] - 1, y, "right"]); edges.push([t.at[0] + w, y, "left"]); }
              const spot = edges.find(([x, y]) => this.canWalk(x, y));
              if (!spot) { report(false, "NOEDGE"); return; }
              window.__teleport(spot[0], spot[1]);
              this.triggers.forEach(x => { if (x.id === simtrig) x.inside = false; });
              this.tryMove(spot[2]);
              setTimeout(() => {
                const dlg = document.querySelector("#dialog");
                const txt = (document.querySelector("#dlgText") || {}).textContent || "";
                report(dlg && !dlg.classList.contains("hide") && txt.trim(), `enter text="${txt.slice(0, 16)}"`);
              }, 700);
            }, 700);
          }
        }
        // E2E:?simpage=npcId 传送到 NPC 旁开启对话,报告首句(配 ?setflag= 验条件对话页切换)
        const simpage = new URLSearchParams(location.search).get("simpage");
        if (simpage) setTimeout(() => {
          const n = (this.npcs || []).find(x => x.data.id === simpage);
          let res;
          if (!n) res = `SIMPAGE ${simpage} NONPC FAIL`;
          else {
            const spot = [[n.gx, n.gy + 1], [n.gx, n.gy - 1], [n.gx + 1, n.gy], [n.gx - 1, n.gy]].find(([x, y]) => this.canWalk(x, y));
            if (!spot) res = `SIMPAGE ${simpage} NOSPOT FAIL`;
            else {
              this.endActionDialog(); // auto 触发器可能占着对话框,先收掉
              window.__teleport(spot[0], spot[1]);
              this.startDialog(this.nearNPC || n);
              const txt = (document.querySelector("#dlgText") || {}).textContent || "";
              res = `SIMPAGE ${simpage} text="${txt.slice(0, 20)}" ${txt.trim() ? "PASS" : "FAIL"}`;
            }
          }
          document.title = res;
          const dd = document.createElement("div"); dd.id = "simPageOut"; dd.textContent = res;
          dd.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:#000;color:#0f0;font:14px monospace;padding:8px"; document.body.appendChild(dd);
        }, 1200);
        const simact = new URLSearchParams(location.search).get("simact");
        if (simact) {
          const ip = (this.iprops || []).find(p => p.id === simact);
          const dlg = document.querySelector("#dialog");
          let res;
          if (ip) {
            this.endActionDialog(); // auto 触发器可能占着对话框
            this.interactProp(ip);
            const t = document.querySelector("#dlgText");

        document.querySelector("#interact").classList.add("hide");
        document.querySelector("#dialog").classList.remove("hide");
        this.renderDialogNode(this.curDialog.start || 0);
      }
      renderDialogNode(idx) {
        if (idx === "end" || idx == null) { this.endDialog(); return; }
        const node = this.curDialog.nodes[idx];
        if (!node) { this.endDialog(); return; }
        this.curNode = idx;
        // M5 节点级静默指令:set/addClue/giveItem 在节点显示时执行(幂等——各 store 自带去重)
        (node.do || []).forEach(a => {
          if (a.type === "set") setFlag(a.flag, a.value !== false);
          else if (a.type === "addClue") revealClue(a.clueId);
          else if (a.type === "giveItem") doGiveItem(a.itemId, a.itemName);
        });
        document.querySelector("#dlgSpeaker").textContent = node.speaker || "";
        const _txt = document.querySelector("#dlgText");
        _txt.textContent = node.text || "";
        _txt.classList.toggle("inner", (node.text || "").trim().startsWith("（")); // 凤翎内心独白=琥珀斜体
        // 分歧点 banner(节点有 choices 时显示)
        const dlg = document.querySelector("#dialog");
        let banner = dlg.querySelector(".dlg-branch-banner");
        if (node.choices && node.choices.length) {
          if (!banner) {
            banner = document.createElement("div");
            banner.className = "dlg-branch-banner";
            banner.innerHTML = "⚡ 这是一个分歧点 — 你的选择将留下痕迹";
            dlg.insertBefore(banner, dlg.firstChild);
          }
        } else if (banner) { banner.remove(); }
        const box = document.querySelector("#dlgChoices"); box.innerHTML = "";
        if (node.choices && node.choices.length) {
          node.choices.forEach(c => {
            const b = document.createElement("button");
            b.textContent = c.label;
            b.onclick = () => {
              // 应用 outcome:写入 localStorage + 显示分支痕迹 toast
              if (c.outcome) {
                const all = (this.ch.branchOutcomes || {});
                const o = all[c.outcome];
                if (o && !loadBranches().includes(c.outcome)) {
                  saveBranch(c.outcome);
                  showClueToast(o.text, "⚡ 分支痕迹:" + o.title);
                  buildRecords();
                }
              }
              this.renderDialogNode(c.goto);
            };
            box.appendChild(b);
          });
        } else {
          const b = document.createElement("button"); b.className = "cont";
          b.textContent = (node.goto === "end" || node.goto == null) ? "结束对话 ›" : "继续 ›";
          b.onclick = () => this.renderDialogNode(node.goto != null ? node.goto : "end"); box.appendChild(b);
        }
      }
      advanceDialog() {
        const node = this.curDialog && this.curDialog.nodes[this.curNode];
        if (node && (!node.choices || !node.choices.length)) this.renderDialogNode(node.goto != null ? node.goto : "end");
      }
      endDialog() {
        this.dialogActive = false;
        document.querySelector("#dialog").classList.add("hide");
        document.querySelector("#dlgChoices").innerHTML = "";
        // 完成与本篇关键单元的对话 → 记录这一篇线索（存 localStorage）；silent 单元（如观察窗这类纯环境叙事点）不触发记录
        const talking = this.curTalkingNpc;
        if (this.ch.clue && !(talking && talking.data.silent) && !hasRecordId(this.ch.id)) { saveRecordId(this.ch.id); buildRecords(); showClueToast(this.ch.clue); }
        this.updateNearNPC();
        setTimeout(() => this.checkTriggers("auto"), 180);
      }
    }

    // 外部导航钩子（DOM 按钮 / 概览卡片调用）
    window.__enterRoom = (id) => {
      const ch = DATA.chapters.find(c => c.id === id);
      if (ch && !chapterUnlocked(ch)) { showClueToast("", "🔒 " + (ch.lockHint || "尚未解锁")); return; }
      window.__fromArea = null; // 从世界图/面板直进:返回链路回世界图
      $("#worldmap").classList.add("hide"); $("#detail").classList.add("hide");
      GAME.scene.start("room", { chapterId: id });
    };
    window.__enterEditor = (id) => {
      // 进编辑器 = 跳 URL(setupEditor 在 BootScene.create 里处理 ?edit=)
      location.href = `/index.html?edit=${id}&_=${Date.now()}`;
    };
    window.__backToWorld = () => {
      // 在"从区域进的设施"里返回 → 回区域大地图;否则回世界图
      const fromArea = window.__fromArea;
      const curScene = GAME.scene.getScene("room");
      const curId = curScene && curScene.chapterId;
      if (fromArea && curId && fromArea !== curId) {
        const at = window.__fromGateAt;
        window.__fromArea = null; window.__fromGateAt = null;
        GAME.scene.start("room", { chapterId: fromArea, spawnAt: at });
        return;
      }
      window.__fromArea = null; window.__fromGateAt = null;
      GAME.scene.stop("room"); showWorldMapView();
    };
    // 世界图顶栏:🛠 工坊编辑器 下拉菜单(列出所有章节,点跳编辑器)
    $("#editorBtn").onclick = e => {
      e.stopPropagation();
      const btn = $("#editorBtn"), menu = $("#editorMenu");
      if (btn.classList.contains("open")) { btn.classList.remove("open"); return; }
      menu.innerHTML = DATA.chapters.map(c => `<div data-ch="${c.id}">🛠 ${c.title} · ${c.name}<small>${c.place}</small></div>`).join("");
      menu.querySelectorAll("div[data-ch]").forEach(d => {
        d.onclick = ev => { ev.stopPropagation(); window.__enterEditor(d.dataset.ch); };
      });
      btn.classList.add("open");
    };
    document.addEventListener("click", () => $("#editorBtn") && $("#editorBtn").classList.remove("open"));
    $("#backBtn").onclick = () => window.__backToWorld();
    $("#lpHomeBtn").onclick = () => { closeDetail(); showLanding(); }; // 平台导航闭环(审查 P1:游戏内原本回不去 Landing)
    $("#recordsBtn").onclick = () => { buildRecords(); $("#records").classList.toggle("hide"); };
    $("#recClose").onclick = () => $("#records").classList.add("hide");

    GAME = new Phaser.Game({
      type: Phaser.AUTO, parent: "game-root",
      width: 960, height: 540, pixelArt: true, backgroundColor: "#06080c", // 画布升档:超大地图 zoom1 视野翻倍,小场景 zoom2 观感不变
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      scene: [BootScene, RoomScene],
    });
    // 调试：手动推进 game loop（绕开预览器冻结的 RAF，用于截图/自动化验证）
    window.__GAME = GAME;
    window.__step = (n = 10) => {
      const errs = [];
      for (let i = 0; i < n; i++) { try { GAME.loop.step(performance.now() + i * 18); } catch (e) { errs.push(String(e)); } }
      return { active: GAME.scene.getScenes(true).map(s => s.scene.key), errs };
    };
  })();
  </script>
</body>
</html>
